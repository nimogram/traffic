<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EQ-Logic Pro | Strategic Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #05070a;
            color: #e2e8f0;
            overflow: hidden;
            touch-action: manipulation;
        }

        .emerald-glow {
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
        }

        .slide-in {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .translate-x-full {
            transform: translateX(100%);
        }

        /* 登録画面の背景：透明度をさらにアップ */
        .bg-glass {
            background: rgba(15, 23, 42, 0.2);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }

        .active-tap:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        .hint-fade {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .target-btn-active {
            background-color: rgba(16, 185, 129, 0.3) !important;
            border-color: #10b981 !important;
            color: #fff !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }

        /* 褒めコメントのオーバーレイ */
        #success-overlay {
            transition: opacity 0.3s ease;
        }

        /* EXPテキストの強調 */
        .exp-text {
            font-size: 1.1rem; /* 大きく調整 */
            font-weight: 800;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="app" class="max-w-lg mx-auto w-full h-screen flex flex-col p-4 gap-3 relative">
        
        <!-- HEADER -->
        <header class="bg-slate-900/40 border border-slate-800 rounded-2xl p-4 relative overflow-hidden emerald-glow">
            <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)]"></div>
            
            <div class="flex justify-between items-start mb-4">
                <div>
                    <div class="text-[10px] font-black text-emerald-500 tracking-[0.2em] mb-1 uppercase">EQ ASSET MANAGEMENT</div>
                    <div class="flex items-baseline gap-2">
                        <span id="total-points" class="text-4xl font-black text-white leading-none tracking-tighter tabular-nums">0</span>
                        <span class="exp-text text-slate-500 uppercase tracking-tighter">Total EXP</span>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <button onclick="toggleMute()" id="mute-btn" class="p-2 rounded-full bg-slate-800/50 text-slate-500">
                        <i data-lucide="volume-2" class="w-4 h-4"></i>
                    </button>
                    <div id="rank-badge" class="text-[10px] font-bold text-emerald-400 px-2 py-0.5 bg-emerald-500/10 rounded-md border border-emerald-500/30 uppercase tracking-wider">
                        孤高の建築家
                    </div>
                </div>
            </div>

            <!-- PROGRESS -->
            <div class="relative pt-2 border-t border-white/5">
                <div class="flex justify-between items-center mb-1.5">
                    <div class="flex items-center gap-1.5 text-emerald-500">
                        <i data-lucide="heart" class="w-3 h-3"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">Gratitude Sync</span>
                    </div>
                    <span id="thanks-counter" class="text-[10px] font-mono font-bold text-slate-400">0 / 5</span>
                </div>
                <div class="h-1 w-full bg-black/60 rounded-full overflow-hidden p-[0.5px]">
                    <div id="thanks-progress" class="h-full bg-gradient-to-r from-emerald-600 to-emerald-400 transition-all duration-700 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- ACTION GRID -->
        <div class="flex-1 grid grid-cols-2 gap-2 overflow-y-auto pr-1" id="action-grid">
            <!-- Buttons injected by JS -->
        </div>

        <!-- HINT AREA (Auto Refresh Every 10s) -->
        <div id="hint-box" class="bg-emerald-500/5 border border-emerald-500/20 p-4 rounded-xl flex items-start gap-3 relative overflow-hidden min-h-[90px]">
            <div class="text-emerald-400 shrink-0 mt-0.5 animate-pulse">
                <i data-lucide="zap" class="w-4 h-4"></i>
            </div>
            <div class="flex-1">
                <p class="text-[8px] font-black text-emerald-500/60 uppercase tracking-widest mb-1">Architect's Strategy Hint</p>
                <div id="hint-text-container">
                    <p id="hint-text" class="text-[11px] font-medium leading-relaxed text-slate-300 italic hint-fade">
                        枕詞：『〇〇さんの知見を拝借したいのですが』は最強の解除キーです。
                    </p>
                </div>
            </div>
        </div>

        <!-- FOOTER ADVICE -->
        <footer id="footer-status" class="bg-emerald-600 p-3 rounded-2xl flex items-center gap-3 border border-white/10 transition-colors duration-500">
            <div class="w-9 h-9 rounded-xl bg-white/10 flex items-center justify-center text-white shrink-0 shadow-inner backdrop-blur-sm">
                <i data-lucide="smile" class="w-5 h-5"></i>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-[8px] text-white/60 font-black uppercase tracking-widest leading-none mb-1">Advisor Output</p>
                <p id="advisor-text" class="text-[10px] font-bold text-white leading-tight">
                    ニモさん、周囲の心理的負荷を軽減するためのパケットを送信してください。
                </p>
            </div>
            <div id="success-icon" class="hidden">
                <i data-lucide="check-circle-2" class="w-5 h-5 text-white animate-bounce"></i>
            </div>
        </footer>
    </div>

    <!-- REGISTRATION SLIDE-IN PANEL -->
    <div id="detail-panel" class="fixed inset-0 z-50 flex justify-end pointer-events-none overflow-hidden">
        <!-- Backdrop -->
        <div id="panel-backdrop" class="absolute inset-0 bg-black/40 opacity-0 transition-opacity pointer-events-none backdrop-blur-sm"></div>
        
        <!-- Panel -->
        <div id="panel-content" class="w-[85%] max-w-sm h-full bg-glass border-l border-emerald-500/30 p-6 slide-in translate-x-full pointer-events-auto flex flex-col gap-6 shadow-[-10px_0_30px_rgba(0,0,0,0.5)]">
            <div class="flex justify-between items-center border-b border-emerald-500/20 pb-4">
                <div>
                    <h2 id="panel-title" class="text-xl font-black text-white tracking-tight">ログ登録</h2>
                    <p id="panel-points" class="text-emerald-400 font-mono font-bold mt-1 tracking-widest"><span class="exp-text">+10 EXP</span> DETECTED</p>
                </div>
                <button onclick="closePanel()" class="p-2 bg-white/10 rounded-full text-slate-200 active-tap">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="space-y-6">
                <!-- Target Person (Button Selector) -->
                <div>
                    <label class="text-[10px] font-black text-emerald-500 tracking-[0.2em] block mb-3 uppercase">Target Person</label>
                    <div id="target-selector" class="grid grid-cols-2 gap-2">
                        <button onclick="selectTarget('AKS')" class="target-opt bg-black/40 border border-slate-700 rounded-xl py-3 text-xs font-bold text-slate-400 transition-all active-tap">AKS</button>
                        <button onclick="selectTarget('YSD')" class="target-opt bg-black/40 border border-slate-700 rounded-xl py-3 text-xs font-bold text-slate-400 transition-all active-tap">YSD</button>
                        <button onclick="selectTarget('YKO')" class="target-opt bg-black/40 border border-slate-700 rounded-xl py-3 text-xs font-bold text-slate-400 transition-all active-tap">YKO</button>
                        <button onclick="selectTarget('OTHER')" class="target-opt bg-black/40 border border-slate-700 rounded-xl py-3 text-xs font-bold text-slate-400 transition-all active-tap">OTHER</button>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-emerald-500 tracking-[0.2em] block mb-2 uppercase">Strategic Memo</label>
                    <textarea id="log-memo" rows="6" placeholder="状況、反応、改善ロジックを記録..." class="w-full bg-black/40 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-emerald-500 transition-colors placeholder:text-slate-700"></textarea>
                </div>
            </div>

            <div class="mt-auto pb-4">
                <button onclick="saveLog()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-900/40 transition-all active:scale-95 uppercase tracking-widest text-sm">
                    Confirm Execution
                </button>
            </div>
        </div>
    </div>

    <!-- SUCCESS FEEDBACK OVERLAY -->
    <div id="success-overlay" class="fixed inset-0 z-[100] flex items-center justify-center pointer-events-none opacity-0">
        <div class="bg-emerald-500 text-slate-950 p-8 rounded-3xl shadow-[0_0_50px_rgba(16,185,129,0.5)] flex flex-col items-center text-center max-w-[80%]">
            <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mb-4 animate-bounce">
                <i data-lucide="award" class="w-10 h-10"></i>
            </div>
            <p id="success-exp" class="text-3xl font-black mb-2">+10 EXP</p>
            <p id="success-msg" class="text-sm font-bold leading-relaxed italic">完璧な戦略的判断です、ニモさん！</p>
        </div>
    </div>

    <script>
        // CONFIG
        const LEVELS = [
            { min: 0, name: "孤高の建築家", color: "text-slate-400" },
            { min: 501, name: "戦略的ディレクター", color: "text-emerald-400" },
            { min: 2001, name: "全知全能の参謀", color: "text-yellow-500" }
        ];

        const ACTIONS = [
            { id: 'pillow', label: '枕詞', points: 10, icon: 'message-square', color: 'bg-emerald-600' },
            { id: 'vision', label: '顧客視点', points: 20, icon: 'target', color: 'bg-teal-600' },
            { id: 'buffer', label: '3秒待機', points: 50, icon: 'cpu', color: 'bg-emerald-700' },
            { id: 'network', label: '雑談', points: 40, icon: 'users', color: 'bg-slate-700' },
            { id: 'thanks_daily', label: 'ありがとう', points: 5, icon: 'heart', color: 'bg-emerald-500 shadow-emerald-900/40' },
            { id: 'thanks_spec', label: '具体称賛', points: 15, icon: 'smile', color: 'bg-emerald-400 text-emerald-950 shadow-emerald-900/20' },
            { id: 'thanks_pub', label: '公開称賛', points: 30, icon: 'trophy', color: 'bg-amber-500 text-amber-950 shadow-amber-900/20' },
            { id: 'reset', label: '履歴消去', points: 0, icon: 'history', color: 'bg-slate-800' }
        ];

        const TIPS = [
            "枕詞：『〇〇さんの知見を拝借したいのですが』は最強の解除キーです。",
            "視点：正論は『正しさ』の証明ではなく、時に『攻撃』として処理されます。",
            "背景・理由を30秒付ける（依頼・意見の前に「なぜか」を伝える）",
            "相手の考えの根拠を聞く（反論する前に理解する）",
            "相手が大事にしていることを知る",
            "小さな約束は必ず守る",
            "相手の成功・貢献を見つけて伝える",
            "💬 交流：一方通行ではなく、対話にする",
            "💬 交流：「報告」ではなく「相談」に変える",
            "💬 交流：ミスを責めず、次に焦点を当てる",
            "💬 交流：言ったと思ったら、もう一度言う（感謝・労い）",
            "💬 交流：メールではなく、まず口頭で伝える",
            "🤝 尊重：相手の視点を優先する場面を意識的に作る",
            "🤝 尊重：相手の判断を信頼し、口出ししすぎない",
            "🤝 尊重：相手の勉強・成長の機会をサポートする",
            "🤝 尊重：相手の家族・趣味・目標について知る",
            "⏱ 行動：妻には「家族イベント」を最優先で伝える",
            "⏱ 行動：同僚には月1回、進捗や悩みを一緒に棚卸しする",
            "⏱ 行動：定期的に一緒に食事・雑談する時間を作る",
            "戦術：論破は短期的な勝利、共感は長期的な支配（レバレッジ）です。",
            "視点：相手を『不完全なプログラム』だと思えば、怒りは消え、デバッグに集中できます。"
        ];

        const PRAISES = [
            "完璧な戦略的判断です、ニモさん！",
            "組織の潤滑油が注入されましたよ！",
            "SEのOSがアップデートされましたね！",
            "さすが五黄土星の統率力です！",
            "卓越したコミュニケーション投資ですね！",
            "この一手でレバレッジが掛かりますよ！",
            "ニモさん、今日も最高にキレてますね！"
        ];

        // STATE
        let state = {
            totalPoints: 0,
            dailyThanks: 0,
            isMuted: false,
            currentAction: null,
            selectedTarget: null
        };

        let audioCtx = null;
        let hintInterval = null;

        // INIT
        function init() {
            lucide.createIcons();
            renderButtons();
            updateUI();
            startHintRotation();
        }

        function renderButtons() {
            const grid = document.getElementById('action-grid');
            ACTIONS.forEach(action => {
                const btn = document.createElement('button');
                btn.className = `${action.color} relative flex flex-col items-center justify-center p-4 rounded-2xl active-tap transition-all shadow-lg`;
                btn.onclick = () => handleAction(action);
                btn.innerHTML = `
                    <div class="mb-2"><i data-lucide="${action.icon}" class="w-6 h-6"></i></div>
                    <span class="text-[11px] font-black uppercase tracking-tight">${action.label}</span>
                    <span class="exp-text opacity-60 mt-0.5">${action.id === 'reset' ? 'CLEAR' : '+' + action.points + ' EXP'}</span>
                `;
                grid.appendChild(btn);
            });
            lucide.createIcons();
        }

        // HINT ROTATION (10s Cycle)
        function startHintRotation() {
            if (hintInterval) clearInterval(hintInterval);
            hintInterval = setInterval(() => {
                refreshHint();
            }, 10000);
        }

        function refreshHint() {
            const hintText = document.getElementById('hint-text');
            hintText.classList.remove('hint-fade');
            void hintText.offsetWidth; // Trigger reflow
            hintText.innerText = TIPS[Math.floor(Math.random() * TIPS.length)];
            hintText.classList.add('hint-fade');
        }

        // SOUND
        function playSound(type) {
            if (state.isMuted) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.exponentialRampToValueAtTime(440, now + 0.1);
                gain.gain.setValueAtTime(0.04, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'success') {
                osc.type = 'triangle';
                [523, 659, 783, 1046, 1318].forEach((f, i) => {
                    osc.frequency.setValueAtTime(f, now + (i * 0.08));
                });
                gain.gain.setValueAtTime(0.04, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            }
        }

        // HANDLERS
        function handleAction(action) {
            if (action.id === 'reset') {
                state.totalPoints = 0;
                state.dailyThanks = 0;
                playSound('click');
                updateUI();
                return;
            }

            playSound('click');
            state.currentAction = action;
            openPanel(action);
            updateUI();
            
            refreshHint();
            startHintRotation(); 
        }

        function openPanel(action) {
            const panel = document.getElementById('detail-panel');
            const content = document.getElementById('panel-content');
            const backdrop = document.getElementById('panel-backdrop');
            
            document.getElementById('panel-title').innerText = `${action.label}の戦略記録`;
            document.getElementById('panel-points').innerHTML = `<span class="exp-text">+${action.points} EXP</span> DETECTED`;
            document.getElementById('log-memo').value = '';
            
            state.selectedTarget = null;
            const targetBtns = document.querySelectorAll('.target-opt');
            targetBtns.forEach(btn => btn.classList.remove('target-btn-active'));

            panel.classList.remove('pointer-events-none');
            content.classList.remove('translate-x-full');
            backdrop.style.opacity = '1';
            backdrop.classList.add('pointer-events-auto');
        }

        function selectTarget(target) {
            state.selectedTarget = target;
            const targetBtns = document.querySelectorAll('.target-opt');
            targetBtns.forEach(btn => {
                if (btn.innerText === target) {
                    btn.classList.add('target-btn-active');
                } else {
                    btn.classList.remove('target-btn-active');
                }
            });
            playSound('click');
        }

        function closePanel() {
            const panel = document.getElementById('detail-panel');
            const content = document.getElementById('panel-content');
            const backdrop = document.getElementById('panel-backdrop');

            content.classList.add('translate-x-full');
            backdrop.style.opacity = '0';
            backdrop.classList.remove('pointer-events-auto');
            setTimeout(() => {
                panel.classList.add('pointer-events-none');
            }, 400);
        }

        function saveLog() {
            const action = state.currentAction;
            state.totalPoints += action.points;
            if (action.id.startsWith('thanks')) {
                state.dailyThanks++;
            }

            // Show Success Feedback
            showSuccessOverlay(action);
            
            updateUI();
            closePanel();
        }

        function showSuccessOverlay(action) {
            const overlay = document.getElementById('success-overlay');
            const expText = document.getElementById('success-exp');
            const msgText = document.getElementById('success-msg');

            expText.innerText = `+${action.points} EXP`;
            msgText.innerText = PRAISES[Math.floor(Math.random() * PRAISES.length)];

            overlay.style.opacity = '1';
            playSound('success');

            setTimeout(() => {
                overlay.style.opacity = '0';
            }, 2000);
        }

        function toggleMute() {
            state.isMuted = !state.isMuted;
            const btn = document.getElementById('mute-btn');
            btn.innerHTML = `<i data-lucide="${state.isMuted ? 'volume-x' : 'volume-2'}" class="w-4 h-4"></i>`;
            lucide.createIcons();
        }

        function updateUI() {
            document.getElementById('total-points').innerText = state.totalPoints.toLocaleString();
            document.getElementById('thanks-counter').innerText = `${state.dailyThanks} / 5`;
            
            const progress = (state.dailyThanks / 5) * 100;
            document.getElementById('thanks-progress').style.width = `${Math.min(100, progress)}%`;

            const rank = [...LEVELS].reverse().find(l => state.totalPoints >= l.min) || LEVELS[0];
            const badge = document.getElementById('rank-badge');
            badge.innerText = rank.name;
            badge.className = `text-[10px] font-bold ${rank.color} px-2 py-0.5 bg-slate-800 rounded-md border border-slate-700 uppercase tracking-wider`;

            const footer = document.getElementById('footer-status');
            const advisor = document.getElementById('advisor-text');
            const successIcon = document.getElementById('success-icon');

            if (state.dailyThanks >= 5) {
                footer.classList.remove('bg-emerald-600');
                footer.classList.add('bg-emerald-500');
                advisor.innerText = "同期完了。非常に合理的な振る舞いです。精神リソースの回復に努めてください。";
                successIcon.classList.remove('hidden');
            } else {
                footer.classList.add('bg-emerald-600');
                footer.classList.remove('bg-emerald-500');
                advisor.innerText = `あと${5 - state.dailyThanks}回の感謝パケット送信が必要です。バフを切らさないでください。`;
                successIcon.classList.add('hidden');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
