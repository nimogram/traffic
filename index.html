
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EQ-Logic Pro | Octalysis Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        :root {
            --base-black: #0a0a0a;
            --accent-lime: #84cc16;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--base-black);
            color: #f8fafc;
            overflow: hidden;
            touch-action: manipulation;
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .theme-glow {
            box-shadow: 0 0 30px rgba(132, 204, 22, 0.1);
        }

        .active-tap:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        .typewriter::after {
            content: '|';
            animation: blink 1s step-end infinite;
            color: var(--accent-lime);
        }

        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }

        .log-item-container {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            margin-bottom: 2px;
        }

        .log-item-content {
            position: relative;
            z-index: 2;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .delete-btn-bg {
            position: absolute; right: 0; top: 0; bottom: 0; width: 60px;
            background-color: #ef4444; color: white;
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 10px; z-index: 1; border-radius: 4px;
            font-weight: 900; font-size: 8px;
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.1;
        }

        .chart-wrapper {
            width: 100%;
            max-width: 200px;
            margin: 0 auto;
            position: relative;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">

    <div id="app" class="max-w-lg mx-auto w-full h-[calc(100dvh-2rem)] flex flex-col gap-3 relative">
        
        <!-- HEADER -->
        <header id="global-header" class="liquid-glass rounded-[1.5rem] p-4 theme-glow shrink-0">
            <div class="flex justify-between items-start mb-3">
                <div onclick="toggleMasterView()" class="cursor-pointer">
                    <p class="text-[8px] font-black text-lime-500 tracking-[0.3em] mb-0.5 uppercase">EQ ASSET LOGIC</p>
                    <div class="flex items-baseline gap-2">
                        <!-- v12.3: Shrunk to text-xl to match all screens -->
                        <span id="header-total-points" class="text-xl font-black text-white tracking-tighter tabular-nums">0</span>
                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">EXP Asset</span>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <div id="heart-container" class="flex gap-0.5">
                        <i data-lucide="heart" class="w-3 h-3 text-lime-500 fill-lime-500"></i>
                        <i data-lucide="heart" class="w-3 h-3 text-lime-500 fill-lime-500"></i>
                        <i data-lucide="heart" class="w-3 h-3 text-lime-500 fill-lime-500"></i>
                        <i data-lucide="heart" class="w-3 h-3 text-lime-500 fill-lime-500"></i>
                        <i data-lucide="heart" class="w-3 h-3 text-lime-500 fill-lime-500"></i>
                    </div>
                    <button onclick="toggleMute()" class="p-2 rounded-xl bg-white/5 border border-white/10 active-tap">
                        <i id="mute-icon" data-lucide="volume-2" class="w-3 h-3 text-slate-400"></i>
                    </button>
                </div>
            </div>

            <div class="bg-black/40 rounded-xl p-3 border border-white/5">
                <div class="flex justify-between items-end mb-1">
                    <div>
                        <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest leading-none mb-1">Strategy Stage</p>
                        <p id="level-badge" class="text-[10px] font-black text-lime-400 uppercase tracking-widest leading-none">Lv.1 Specialist</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] font-black text-slate-500 uppercase leading-none mb-0.5">Next Goal</p>
                        <div class="flex items-baseline leading-none">
                            <span id="next-level-info" class="text-sm font-black text-white tabular-nums">+500</span>
                            <span class="text-[8px] font-black text-slate-500 uppercase ml-1">EXP</span>
                        </div>
                    </div>
                </div>
                <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                    <div id="level-progress-bar" class="h-full bg-gradient-to-r from-lime-600 to-lime-300" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- ADVISOR -->
        <div id="advisor-box" class="liquid-glass p-4 rounded-[1.5rem] flex items-start gap-3 shrink-0">
            <div class="w-8 h-8 rounded-lg bg-lime-500/10 border border-lime-500/20 flex items-center justify-center text-lime-400 shrink-0">
                <i data-lucide="shield-check" class="w-5 h-5"></i>
            </div>
            <div class="flex-1 min-h-[40px]">
                <p id="advisor-text" class="text-[13px] font-bold text-white leading-relaxed typewriter">Initializing...</p>
            </div>
        </div>

        <!-- MAIN ACTION VIEW -->
        <div id="action-view" class="flex-1 grid grid-cols-2 gap-2 overflow-y-auto pr-1 content-start pb-20"></div>

        <!-- STATS VIEW -->
        <div id="stats-view" class="hidden flex-1 flex flex-col gap-2 overflow-hidden">
            <!-- Points & Goal (Consistently text-xl) -->
            <div class="liquid-glass p-3 rounded-[1.5rem] text-center shrink-0 border border-lime-500/10">
                <p class="text-[8px] font-black text-slate-500 uppercase tracking-[0.3em] mb-0.5">Total EXP Asset</p>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="stats-total-points" class="text-xl font-black text-white tabular-nums tracking-tighter">0</span>
                    <span id="stats-next-goal" class="text-[10px] font-bold text-lime-400 uppercase tracking-widest opacity-80">+0 NEXT</span>
                </div>
            </div>
            
            <div class="liquid-glass p-2 rounded-[1.5rem] shrink-0">
                <div class="chart-wrapper">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>

            <!-- Scrollable History List -->
            <div class="flex-1 overflow-y-auto space-y-1 pb-24 pr-1" id="history-list"></div>
        </div>

        <!-- TOGGLE BUTTON -->
        <button id="toggle-view-btn" onclick="toggleView()" class="fixed bottom-8 right-6 w-14 h-14 bg-lime-500 text-black rounded-2xl shadow-xl flex items-center justify-center active-tap z-50">
            <i id="view-icon" data-lucide="bar-chart-3" class="w-6 h-6"></i>
        </button>

        <!-- COMMIT PANEL -->
        <div id="detail-panel" class="fixed inset-0 z-50 flex justify-end pointer-events-none overflow-hidden">
            <div id="panel-backdrop" class="absolute inset-0 bg-black/80 opacity-0 transition-opacity"></div>
            <div id="panel-content" class="w-[90%] h-full liquid-glass border-l border-white/10 p-6 transform translate-x-full transition-transform duration-400 pointer-events-auto flex flex-col gap-6">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="text-lg font-black text-white uppercase">Commit Log</h2>
                        <!-- v12.3: Consistent text-xl -->
                        <p id="panel-points" class="text-xl font-black text-lime-400 tracking-tighter tabular-nums mt-0.5">+10 EXP</p>
                    </div>
                    <button onclick="closePanel()" class="p-2 bg-white/10 rounded-full text-white active-tap"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="space-y-6 flex-1 overflow-y-auto">
                    <div>
                        <p class="text-[10px] font-black text-white/50 uppercase tracking-widest mb-3">Target Sync</p>
                        <div id="target-selector" class="grid grid-cols-2 gap-2">
                            <button onclick="selectTarget('AKS')" class="target-opt bg-white/5 border border-white/10 rounded-xl py-3 text-[10px] font-bold text-white active-tap">AKS</button>
                            <button onclick="selectTarget('YSD')" class="target-opt bg-white/5 border border-white/10 rounded-xl py-3 text-[10px] font-bold text-white active-tap">YSD</button>
                            <button onclick="selectTarget('YKO')" class="target-opt bg-white/5 border border-white/10 rounded-xl py-3 text-[10px] font-bold text-white active-tap">YKO</button>
                            <button onclick="selectTarget('BODY')" class="target-opt bg-white/5 border border-white/10 rounded-xl py-3 text-[10px] font-bold text-white active-tap">HEALTH</button>
                        </div>
                    </div>
                    <textarea id="log-memo" rows="3" placeholder="状況、反応、改善..." class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-xs text-white focus:border-lime-500/50 outline-none"></textarea>
                </div>
                <button onclick="saveLog()" class="shrink-0 w-full bg-lime-500 text-black font-black py-4 rounded-xl text-md active-tap">COMMIT ENTRY</button>
            </div>
        </div>

        <!-- MASTER VIEW -->
        <div id="master-view" class="hidden fixed inset-0 z-[100] bg-black/90 backdrop-blur-xl p-8 flex flex-col overflow-y-auto transform translate-y-full transition-transform duration-500">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-sm font-black text-white uppercase tracking-widest">Maintenance</h3>
                <button onclick="toggleMasterView()" class="p-3 bg-white/10 rounded-full text-white active-tap"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="master-list" class="space-y-3 pb-20"></div>
        </div>
    </div>

    <script>
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz-Lk_8UhahzIlmYDtf6Dh5N_B53cJUUnlm6Ig5MwHvtPO7J4IZ2gXiNo8imHvPHiEh9g/exec"; 
        const DEFAULT_ACTIONS = [
            { id: 'pillow', label: '枕詞', points: 10, icon: 'message-square', color: 'from-cyan-400 to-blue-600' },
            { id: 'gym', label: 'GYM', points: 20, icon: 'dumbbell', color: 'from-indigo-400 to-violet-600' },
            { id: 'buffer', label: '3秒待機', points: 10, icon: 'cpu', color: 'from-fuchsia-500 to-purple-600' },
            { id: 'network', label: '雑談', points: 15, icon: 'users', color: 'from-emerald-400 to-teal-600' },
            { id: 'thanks_daily', label: 'ありがとう', points: 5, icon: 'heart', color: 'from-pink-400 to-rose-600' },
            { id: 'stairs', label: '階段利用', points: 5, icon: 'trending-up', color: 'from-orange-400 to-rose-500' },
            { id: 'thanks_pub', label: '称賛', points: 30, icon: 'trophy', color: 'from-yellow-400 to-orange-600' },
            { id: 'bike', label: '自転車通勤', points: 10, icon: 'bike', color: 'from-lime-400 to-emerald-500' }
        ];

        let state = { totalPoints: 0, currentLevel: 1, isMuted: false, currentAction: null, selectedTarget: null, view: 'action', logs: [], actions: [] };
        let radarChartInstance = null;
        let typeWriterTimeout = null;

        function getExpRequiredForLevel(lv) { return Math.floor(500 + (2000 / (1 + Math.exp(-0.5 * (lv - 5))))); }

        function init() { loadData(); lucide.createIcons(); renderButtons(); updateUI(); startAdvisor(); syncFromGas(); }
        
        function loadData() {
            const saved = localStorage.getItem('eq_logic_v11');
            if (saved) {
                const p = JSON.parse(saved);
                state.totalPoints = p.totalPoints || 0;
                state.logs = p.logs || [];
                state.actions = (p.actions && p.actions.length === 8) ? p.actions : DEFAULT_ACTIONS;
            } else { state.actions = DEFAULT_ACTIONS; }
        }

        function saveData() { localStorage.setItem('eq_logic_v11', JSON.stringify({ totalPoints: state.totalPoints, logs: state.logs, actions: state.actions })); }

        async function syncFromGas() {
            try {
                const res = await fetch(GAS_WEBAPP_URL);
                const cloudLogs = await res.json();
                if (Array.isArray(cloudLogs)) {
                    state.logs = cloudLogs.map((l, i) => ({
                        id: i, label: l.label, points: l.points, target: l.target, timestamp: l.timestamp,
                        colorClass: state.actions.find(a => a.label === l.label)?.color || 'from-slate-800'
                    }));
                    state.totalPoints = cloudLogs.reduce((s, l) => s + l.points, 0);
                    saveData(); updateUI();
                }
            } catch (e) { console.error(e); }
        }

        function startAdvisor() {
            const el = document.getElementById('advisor-text');
            const txt = "✨ 相手の話を聞く時はスマホを伏せる。最高のパフォーマンスになります。";
            if (typeWriterTimeout) clearTimeout(typeWriterTimeout);
            el.innerText = ''; let i = 0;
            function type() { if (i < txt.length) { el.innerText += txt.charAt(i); i++; typeWriterTimeout = setTimeout(type, 50); } }
            type();
        }

        function updateUI() {
            let pts = state.totalPoints; let lv = 1;
            while (pts >= getExpRequiredForLevel(lv)) { pts -= getExpRequiredForLevel(lv); lv++; }
            const req = getExpRequiredForLevel(lv);
            document.getElementById('header-total-points').innerText = state.totalPoints.toLocaleString();
            document.getElementById('stats-total-points').innerText = state.totalPoints.toLocaleString();
            document.getElementById('stats-next-goal').innerText = `+${req - pts} NEXT`;
            document.getElementById('level-badge').innerText = `Lv.${lv} Specialist`;
            document.getElementById('next-level-info').innerText = `+${req - pts}`;
            document.getElementById('level-progress-bar').style.width = `${(pts / req) * 100}%`;
        }

        function renderButtons() {
            const container = document.getElementById('action-view'); container.innerHTML = '';
            state.actions.forEach((a, i) => {
                const btn = document.createElement('button');
                btn.className = `bg-gradient-to-br ${a.color} rounded-2xl flex items-center justify-between px-4 active-tap h-[64px] border border-white/10`;
                btn.onclick = () => { state.currentAction = a; if (['gym', 'stairs', 'bike'].includes(a.id)) { state.selectedTarget = 'BODY'; saveLog(""); } else openPanel(a); };
                btn.innerHTML = `<div class="flex items-center gap-2"><i data-lucide="${a.icon}" class="w-4 h-4 text-white"></i><span class="text-[13px] font-black text-white">${a.label}</span></div><span class="text-[10px] font-black text-white/40">+${a.points}</span>`;
                container.appendChild(btn);
            });
            lucide.createIcons();
        }

        function toggleView() {
            state.view = state.view === 'action' ? 'stats' : 'action';
            document.getElementById('global-header').classList.toggle('hidden', state.view === 'stats');
            document.getElementById('advisor-box').classList.toggle('hidden', state.view === 'stats');
            document.getElementById('action-view').classList.toggle('hidden', state.view !== 'action');
            document.getElementById('stats-view').classList.toggle('hidden', state.view !== 'stats');
            const icon = document.getElementById('view-icon');
            icon.setAttribute('data-lucide', state.view === 'stats' ? 'layout-grid' : 'bar-chart-3');
            if (state.view === 'stats') renderStats();
            lucide.createIcons();
        }

        function openPanel(a) {
            state.selectedTarget = null;
            document.getElementById('panel-title').innerText = `${a.label} Commit`;
            document.getElementById('panel-points').innerText = `+${a.points} EXP`;
            document.getElementById('detail-panel').classList.remove('pointer-events-none');
            document.getElementById('panel-content').classList.remove('translate-x-full');
            document.getElementById('panel-backdrop').style.opacity = '1';
        }

        function closePanel() {
            document.getElementById('panel-content').classList.add('translate-x-full');
            document.getElementById('panel-backdrop').style.opacity = '0';
            setTimeout(() => document.getElementById('detail-panel').classList.add('pointer-events-none'), 400);
        }

        function selectTarget(t) {
            state.selectedTarget = t;
            document.querySelectorAll('.target-opt').forEach(btn => {
                btn.style.borderColor = btn.innerText.includes(t==='BODY'?'HEALTH':t) ? 'var(--accent-lime)' : 'rgba(255,255,255,0.1)';
            });
        }

        function saveLog(memo = null) {
            const a = state.currentAction; const target = state.selectedTarget || 'BODY';
            const log = { id: Date.now(), label: a.label, points: a.points, target: target, timestamp: new Date().toISOString(), colorClass: a.color };
            state.logs.unshift(log); state.totalPoints += a.points;
            fetch(GAS_WEBAPP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ ...log, memo: memo || document.getElementById('log-memo').value }) });
            saveData(); updateUI(); closePanel();
        }

        function renderStats() {
            const list = document.getElementById('history-list'); list.innerHTML = '';
            const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const weekLogs = state.logs.filter(l => new Date(l.timestamp).getTime() >= (today - 6*24*60*60*1000));
            const labels = state.actions.map(a => a.label);
            const dataCounts = labels.map(label => weekLogs.filter(l => l.label === label).length);
            updateRadarChart(labels, dataCounts);

            state.logs.filter(l => new Date(l.timestamp).getTime() >= (today - 3*24*60*60*1000)).forEach(l => {
                const container = document.createElement('div'); container.className = 'log-item-container liquid-glass';
                const localISOTime = new Date(new Date(l.timestamp).getTime() - new Date().getTimezoneOffset() * 60000).toISOString().slice(11, 16);
                container.innerHTML = `
                    <div class="delete-btn-bg" onclick="deleteLog(${l.id})">DELETE</div>
                    <!-- v12.3: py-0 for extreme compression -->
                    <div class="log-item-content flex justify-between items-center py-0 bg-gradient-to-r ${l.colorClass} border-b border-white/5">
                        <div class="flex flex-col flex-1 pl-3 py-1">
                            <div class="flex items-center gap-2">
                                <span class="text-[11px] font-black text-white shrink-0">${l.label}</span>
                                <span class="text-[9px] font-bold text-white/30 tabular-nums">${localISOTime}</span>
                            </div>
                            <span class="text-[6px] font-black text-white/20 uppercase tracking-[0.2em] leading-none">${l.target}</span>
                        </div>
                        <span class="text-[12px] font-black text-white pr-3">+${l.points}</span>
                    </div>
                `;
                list.appendChild(container);
            });
        }

        function updateRadarChart(labels, data) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (radarChartInstance) radarChartInstance.destroy();
            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{ data: data, backgroundColor: 'rgba(132, 204, 22, 0.1)', borderColor: '#84cc16', borderWidth: 1, pointRadius: 1 }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.05)' },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            pointLabels: { color: 'rgba(255,255,255,0.2)', font: { size: 6, weight: '900' } },
                            ticks: { display: false },
                            suggestedMin: 0
                        }
                    },
                    plugins: { legend: { display: false } },
                    animation: { duration: 400 }
                }
            });
        }

        function deleteLog(id) {
            const idx = state.logs.findIndex(l => l.id === id);
            if (idx > -1) { state.totalPoints -= state.logs[idx].points; state.logs.splice(idx, 1); saveData(); updateUI(); renderStats(); }
        }

        function toggleMasterView() {
            const m = document.getElementById('master-view');
            const open = m.classList.contains('translate-y-full');
            if (open) { m.classList.remove('hidden'); setTimeout(() => m.classList.remove('translate-y-full'), 10); renderMaster(); }
            else { m.classList.add('translate-y-full'); setTimeout(() => m.classList.add('hidden'), 500); }
        }

        function renderMaster() {
            const list = document.getElementById('master-list'); list.innerHTML = '';
            state.actions.forEach((a, i) => {
                const item = document.createElement('div'); item.className = `p-4 rounded-xl liquid-glass`;
                item.innerHTML = `<div class="flex items-center gap-2 mb-2"><i data-lucide="${a.icon}" class="w-3 h-3 text-lime-500"></i><span class="text-[9px] font-black text-white uppercase">${a.label}</span></div><div class="grid grid-cols-2 gap-2"><input type="text" value="${a.label}" onchange="state.actions[${i}].label=this.value;saveData();" class="bg-black/50 border border-white/10 rounded-lg p-2 text-[10px] text-white"><input type="number" value="${a.points}" onchange="state.actions[${i}].points=parseInt(this.value);saveData();" class="bg-black/50 border border-white/10 rounded-lg p-2 text-[10px] text-white"></div>`;
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
