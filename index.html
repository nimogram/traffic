<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EQ-Logic Pro | Lime Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #05070a;
            color: #e2e8f0;
            overflow: hidden;
            touch-action: manipulation;
        }

        .theme-glow {
            box-shadow: 0 0 25px rgba(132, 204, 22, 0.15);
        }

        .slide-in {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .translate-x-full {
            transform: translateX(100%);
        }

        /* Master View Animation */
        .slide-vertical {
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .-translate-y-full {
            transform: translateY(-100%);
        }

        .bg-glass {
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            transition: background-color 0.4s ease;
        }

        .btn-gradient {
            position: relative;
            border-bottom: 2px solid rgba(0,0,0,0.4);
            overflow: hidden;
        }
        
        .btn-gradient::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        .active-tap {
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .active-tap:active {
            transform: scale(0.96) translateY(2px);
            filter: brightness(0.9);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-entry {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        #level-progress-bar {
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .milestone-bounce {
            animation: milestonePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes milestonePop {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .cursor-active::after {
            content: '|';
            animation: blink 1s step-end infinite;
            color: #84cc16; 
            margin-left: 2px;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        .log-item-container {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 8px;
            touch-action: pan-y;
            animation: fadeInUp 0.3s ease forwards;
        }
        
        .log-item-content {
            position: relative;
            z-index: 2;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: inherit;
        }
        
        .delete-btn-bg {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 100px;
            background-color: #ef4444;
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 20px;
            z-index: 1;
            font-weight: 900;
            font-size: 10px;
            letter-spacing: 0.1em;
            border-radius: 12px;
        }

        .fab-button {
            position: fixed;
            bottom: 70px;
            right: 20px;
            z-index: 50;
            width: 58px;
            height: 58px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(132, 204, 22, 0.4);
        }

        .master-input {
            background-color: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            width: 100%;
            outline: none;
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
            cursor: pointer;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="app" class="max-w-lg mx-auto w-full h-screen flex flex-col p-3 gap-2 relative">
        
        <!-- HEADER -->

        <!-- ADVISOR -->

            <div class="max-w-md mx-auto w-full flex flex-col h-full">
                <div class="flex justify-between items-center mb-6 shrink-0">
                    <div class="flex items-center gap-2">
                        <i data-lucide="sliders" class="w-5 h-5 text-lime-500"></i>

                        <i data-lucide="x" class="w-5 h-5"></i>

        <button id="toggle-view-btn" onclick="toggleView()" class="fab-button bg-lime-500 text-slate-950 active-tap">

                <div class="w-2 h-2 rounded-full bg-lime-500 animate-pulse"></div>

            </div>
            <div class="text-[9px] font-bold text-slate-500">EQ-LOGIC PHYSICAL OS v10.2</div>
        </footer>
    </div>

    <!-- REGISTRATION PANEL (Side-Slide) -->
    <div id="detail-panel" class="fixed inset-0 z-50 flex justify-end pointer-events-none overflow-hidden">
        <div id="panel-backdrop" class="absolute inset-0 bg-black/50 opacity-0 transition-opacity pointer-events-none backdrop-blur-sm"></div>
        <div id="panel-content" class="w-[85%] max-w-sm h-full backdrop-blur-2xl border-l border-white/10 p-6 slide-in translate-x-full pointer-events-auto flex flex-col gap-6 shadow-[-10px_0_30px_rgba(0,0,0,0.5)] opacity-95">
            <div class="flex justify-between items-center border-b border-white/10 pb-4">
                <div>
                    <h2 id="panel-title" class="text-xl font-black text-white">Execution Log</h2>
                    <p id="panel-points" class="text-white font-mono font-bold mt-1 tracking-widest text-2xl">+10 EXP</p>
                </div>
                <button onclick="closePanel()" class="p-2 bg-white/10 rounded-full text-white active-tap"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-white tracking-[0.2em] block mb-3 uppercase opacity-70">Target Sync</label>
                    <div id="target-selector" class="grid grid-cols-2 gap-2">
                        <button onclick="selectTarget('AKS')" class="target-opt bg-white/10 border border-white/20 rounded-xl py-3 text-xs font-bold text-white transition-all active-tap">AKS</button>
                        <button onclick="selectTarget('YSD')" class="target-opt bg-white/10 border border-white/20 rounded-xl py-3 text-xs font-bold text-white transition-all active-tap">YSD</button>
                        <button onclick="selectTarget('YKO')" class="target-opt bg-white/10 border border-white/20 rounded-xl py-3 text-xs font-bold text-white transition-all active-tap">YKO</button>
                        <button onclick="selectTarget('BODY')" class="target-opt bg-white/10 border border-white/20 rounded-xl py-3 text-xs font-bold text-white transition-all active-tap">HEALTH</button>
                    </div>
                </div>
                <textarea id="log-memo" rows="4" placeholder="状況、反応、改善ロジック..." class="w-full bg-black/30 border border-white/20 rounded-xl px-4 py-3 text-sm text-white focus:outline-none placeholder:text-white/30"></textarea>
            </div>
            <button id="submit-log-btn" onclick="saveLog()" class="mt-auto w-full bg-white text-slate-900 font-black py-4 rounded-2xl uppercase tracking-widest text-sm active-tap">Commit Entry</button>
        </div>
    </div>

    <!-- MILESTONE MODAL -->
    <div id="milestone-modal" class="fixed inset-0 z-[110] flex items-center justify-center p-6 hidden pointer-events-none">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md"></div>
        <div class="bg-slate-900 border border-lime-500/30 rounded-[2.5rem] p-8 max-w-sm w-full text-center relative theme-glow milestone-bounce pointer-events-auto">
            <div class="w-20 h-20 bg-gradient-to-br from-lime-400 to-lime-600 rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="award" class="w-10 h-10 text-white"></i></div>
            <h3 class="text-3xl font-black text-white mb-2"><span id="milestone-value">0</span> EXP</h3>
            <p id="milestone-praise" class="text-slate-300 text-sm italic mb-8"></p>
            <button onclick="closeMilestone()" class="w-full bg-lime-600 text-white font-black py-4 rounded-2xl text-sm active-tap">Confirm</button>
        </div>
    </div>

    <script>
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz-Lk_8UhahzIlmYDtf6Dh5N_B53cJUUnlm6Ig5MwHvtPO7J4IZ2gXiNo8imHvPHiEh9g/exec"; 

        const DEFAULT_ACTIONS = [
            { id: 'pillow', label: '枕詞', points: 10, icon: 'message-square', color: 'from-cyan-400 to-blue-600', panelRgba: 'rgba(34, 211, 238, 0.4)' },
            { id: 'gym', label: 'GYM', points: 20, icon: 'dumbbell', color: 'from-indigo-400 to-violet-600', panelRgba: 'rgba(167, 139, 250, 0.4)' },
            { id: 'buffer', label: '3秒待機', points: 10, icon: 'cpu', color: 'from-fuchsia-500 to-purple-600', panelRgba: 'rgba(217, 70, 239, 0.4)' },
            { id: 'network', label: '雑談', points: 15, icon: 'users', color: 'from-emerald-400 to-teal-600', panelRgba: 'rgba(52, 211, 153, 0.4)' },
            { id: 'thanks_daily', label: 'ありがとう', points: 5, icon: 'heart', color: 'from-pink-400 to-rose-600', panelRgba: 'rgba(244, 114, 182, 0.4)' },
            { id: 'stairs', label: '階段利用', points: 5, icon: 'trending-up', color: 'from-orange-400 to-rose-500', panelRgba: 'rgba(251, 146, 60, 0.4)' },
            { id: 'thanks_pub', label: '称賛', points: 30, icon: 'trophy', color: 'from-yellow-400 to-orange-600', panelRgba: 'rgba(250, 204, 21, 0.4)' },
            { id: 'bike', label: '自転車通勤', points: 10, icon: 'bike', color: 'from-lime-400 to-emerald-500', panelRgba: 'rgba(163, 230, 53, 0.4)' }
        ];

        const ADVISORY_DATABASE = [
            "相手の『なぜ』を先に理解することが、最速の合意形成への近道ですよ。",
            "沈黙の3秒は、相手が本音を話すための『招待状』。",
            "階段利用（+5 EXP）は、地道ですが確実な筋肉への投資。ニモさんの忍耐力の証明です。",
            "雑談は信頼の帯域幅。札幌の風を感じながら走る自転車のように、軽やかに会話を。",
            "🎯 相手が大事にしていることを知り、そこを起点に交渉するのがニモさん流です。",
            "⏱ 妻への家族イベント共有、今日のうちに。自転車のギアチェンジのようにスムーズに。",
            "枕詞：『〇〇さんの知見を拝借したいのですが』は最強の解除キーですよ。",
            "正論は時に『攻撃』として処理されます。ニモさんの知性で包み込んでくださいね。",
            "『少しお力添えいただけますか？』で、相手に自尊心を与え、味方に引き込みましょう。",
            "『ありがとう』は次の依頼のための先行投資。ニモさんならその価値がわかりますよね。",
            "結論を急ぐ前に『どう思いますか？』と問い、相手の演算リソースをこちらに向けさせましょう。",
            "GYM（+20 EXP）での筋肥大は、札幌の冬を乗り切るための最高密度の断熱材ですよ。",
            "スクワットの1レップは、将来のニモさんへの配当金です。限界の先を楽しみましょう。",
            "筋肉は裏切りませんが、トレーニングのサボりは翌日のパフォーマンスに直結します。",
            "✨ 『話しかけやすい人』の極意：PC作業中、誰かが近づいたら一度手を止め、3秒だけ相手に視線を向ける。これだけで『割り込みOK』のフラグが立ちますよ。",
            "✨ 挨拶に『北海道の寒さ』を一言添える。その5秒の余白が、相手の警戒心をデフラグします。",
            "✨ 忙しい時ほど『真顔』になりがち。ふとした瞬間に表情筋を0.5ミリ緩めるだけで、ニモさんのオーラが『威圧』から『安心』に変換されますよ。",
            "✨ 相手の話を聞く時は、スマートフォンの画面を伏せる。その物理的な動作が『あなたを最優先に処理している』という最高のアナウンスになります。",
            "✨ 『何かお困りですか？』ではなく、『進捗どうですか？』とフランクに。助けを求めるハードルを下げてあげるのも、帝王の星を持つニモさんの優しさですよ。"
        ];

        let state = { totalPoints: 0, lastMilestone: 0, isMuted: false, currentAction: null, selectedTarget: null, view: 'action', logs: [], actions: [] };
        let audioCtx = null;
        let advisorInterval = null;
        let typeWriterTimeout = null;

        function init() { 
            loadData(); 
            lucide.createIcons(); 
            renderButtons(); 
            updateUI(); 
            startAdvisorRotation(); 
            syncFromGas();
        }
        
        function loadData() {
            const saved = localStorage.getItem('eq_logic_v3');
            if (saved) {
                const p = JSON.parse(saved);
                state.totalPoints = p.totalPoints || 0;
                state.logs = p.logs || [];
                state.lastMilestone = Math.floor(state.totalPoints / 100) * 100;
                state.actions = p.actions || DEFAULT_ACTIONS;
            } else { state.actions = DEFAULT_ACTIONS; }
        }

        function saveData() { 
            localStorage.setItem('eq_logic_v3', JSON.stringify({ totalPoints: state.totalPoints, logs: state.logs, actions: state.actions })); 
        }

        async function syncFromGas() {
            if (!GAS_WEBAPP_URL) return;
            try {
                const response = await fetch(GAS_WEBAPP_URL);
                if (!response.ok) throw new Error('Sync failed');
                const cloudLogs = await response.json();
                
                if (Array.isArray(cloudLogs)) {
                    state.logs = cloudLogs.map((l, index) => ({
                        id: index,
                        actionId: l.label, 
                        label: l.label,
                        points: l.points,
                        target: l.target,
                        timestamp: l.timestamp,
                        colorClass: state.actions.find(a => a.label === l.label)?.color || 'from-slate-800'
                    }));
                    
                    state.totalPoints = cloudLogs.reduce((sum, l) => sum + l.points, 0);
                    state.lastMilestone = Math.floor(state.totalPoints / 100) * 100;
                    
                    saveData();
                    updateUI();
                    if (state.view === 'stats') renderStats();
                }
            } catch (e) {
                console.error("Sync Error (Nimo-OS):", e);
            }
        }

        async function saveToGas(points, label, target, memo) {
            if (!GAS_WEBAPP_URL) return;
            try { 
                await fetch(GAS_WEBAPP_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ 
                        points, label, target, memo, 
                        timestamp: new Date().toISOString() 
                    }) 
                }); 
            } 
            catch (e) { console.error("GAS Persistence Error:", e); }
        }

        function playSound(type) {
            if (state.isMuted) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            switch(type) {
                case 'click': o.type = 'sine'; o.frequency.setValueAtTime(1200, now); o.frequency.exponentialRampToValueAtTime(800, now + 0.1); g.gain.setValueAtTime(0.05, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.1); o.start(now); o.stop(now + 0.1); break;
                case 'success': [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => { const osc = audioCtx.createOscillator(); const gn = audioCtx.createGain(); osc.connect(gn); gn.connect(audioCtx.destination); osc.frequency.setValueAtTime(f, now + i * 0.1); gn.gain.setValueAtTime(0.05, now + i * 0.1); gn.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.4); osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.5); }); break;
                case 'delete': o.type = 'square'; o.frequency.setValueAtTime(440, now); o.frequency.exponentialRampToValueAtTime(110, now + 0.2); g.gain.setValueAtTime(0.03, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.2); o.start(now); o.stop(now + 0.2); break;
            }
        }

        function toggleMute() { state.isMuted = !state.isMuted; const icon = document.getElementById('mute-icon'); icon.setAttribute('data-lucide', state.isMuted ? 'volume-x' : 'volume-2'); lucide.createIcons(); if (!state.isMuted) playSound('click'); }

        function renderButtons() {
            const container = document.getElementById('action-view'); container.innerHTML = '';
            state.actions.forEach((action, index) => {
                const btn = document.createElement('button');
                btn.className = `bg-gradient-to-r ${action.color} btn-gradient flex items-center px-3 rounded-2xl active-tap transition-all shadow-lg h-[76px] animate-entry`;
                btn.style.animationDelay = `${0.3 + index * 0.05}s`;
                btn.onclick = () => { 
                    playSound('click'); 
                    state.currentAction = action; 
                    if (action.id === 'stairs' || action.id === 'bike' || action.id === 'gym') { 
                        state.selectedTarget = 'BODY'; 
                        saveLog(""); 
                    } else { 
                        openPanel(action); 
                    } 
                };
                btn.innerHTML = `<div class="w-6 shrink-0 flex justify-center text-white opacity-90"><i data-lucide="${action.icon}" class="w-4 h-4"></i></div><div class="flex-1 text-center px-1"><span class="font-normal text-white text-[10pt] leading-none tracking-tight uppercase">${action.label}</span></div><div class="w-10 shrink-0 text-right"><span class="font-normal text-white text-[10pt] leading-none tracking-tighter tabular-nums">+${action.points}</span></div>`;
                container.appendChild(btn);
            });
            lucide.createIcons();
        }

        function startAdvisorRotation() { if (advisorInterval) clearInterval(advisorInterval); advisorInterval = setInterval(refreshAdvisor, 8000); refreshAdvisor(); }
        function refreshAdvisor() { const el = document.getElementById('advisor-text'); const txt = ADVISORY_DATABASE[Math.floor(Math.random() * ADVISORY_DATABASE.length)]; el.style.opacity = '0'; setTimeout(() => { typeWriter(el, txt); el.style.opacity = '1'; }, 300); }
        function typeWriter(el, txt) { if (typeWriterTimeout) clearTimeout(typeWriterTimeout); el.innerText = ''; el.classList.add('cursor-active'); let i = 0; function step() { if (i < txt.length) { el.innerText += txt.charAt(i); i++; typeWriterTimeout = setTimeout(step, 60); } else el.classList.remove('cursor-active'); } step(); }

        function openPanel(action) {
            const p = document.getElementById('detail-panel');
            const content = document.getElementById('panel-content');
            document.getElementById('panel-title').innerText = `${action.label} Log`;
            document.getElementById('panel-points').innerText = `+${action.points} EXP`;
            
            content.className = `w-[85%] max-w-sm h-full backdrop-blur-2xl border-l border-white/10 p-6 slide-in translate-x-full pointer-events-auto flex flex-col gap-6 shadow-[-10px_0_30px_rgba(0,0,0,0.5)] opacity-95 bg-gradient-to-br ${action.color}`;
            
            p.classList.remove('pointer-events-none');
            document.getElementById('panel-content').classList.remove('translate-x-full');
            document.getElementById('panel-backdrop').style.opacity = '1';
            state.selectedTarget = null;
            document.getElementById('log-memo').value = '';
            document.querySelectorAll('.target-opt').forEach(btn => btn.classList.remove('bg-white/40', 'border-white/80', 'shadow-[0_0_15px_rgba(255,255,255,0.4)]'));
        }
        function closePanel() { document.getElementById('panel-content').classList.add('translate-x-full'); document.getElementById('panel-backdrop').style.opacity = '0'; setTimeout(() => document.getElementById('detail-panel').classList.add('pointer-events-none'), 400); }

        function selectTarget(t) {
            state.selectedTarget = t; playSound('click');
            const mapping = { 'AKS': 'AKS', 'YSD': 'YSD', 'YKO': 'YKO', 'BODY': 'HEALTH' };
            document.querySelectorAll('.target-opt').forEach(btn => {
                const btnLabel = btn.innerText.trim();
                if (btnLabel === mapping[t]) { 
                    btn.classList.add('bg-white/40', 'border-white/80', 'shadow-[0_0_15px_rgba(255,255,255,0.4)]'); 
                } else { 
                    btn.classList.remove('bg-white/40', 'border-white/80', 'shadow-[0_0_15px_rgba(255,255,255,0.4)]'); 
                }
            });
        }

        function saveLog(manualMemo = null) {
            const a = state.currentAction; const target = state.selectedTarget || 'BODY'; const memo = manualMemo !== null ? manualMemo : document.getElementById('log-memo').value;
            state.logs.push({ id: Date.now(), actionId: a.id, label: a.label, points: a.points, target: target, timestamp: new Date().toISOString(), colorClass: a.color });
            state.totalPoints += a.points; saveToGas(a.points, a.label, target, memo);
            if (Math.floor(state.totalPoints / 100) * 100 > state.lastMilestone) { setTimeout(() => showMilestone(Math.floor(state.totalPoints / 100) * 100), 400); }
            saveData(); updateUI(); closePanel();
        }

        function deleteLog(logId) { const index = state.logs.findIndex(l => l.id === logId); if (index > -1) { playSound('delete'); state.totalPoints -= state.logs[index].points; state.logs.splice(index, 1); saveData(); updateUI(); renderStats(); } }

        function updateLogTimestamp(logId, newTimestampStr) {
            const index = state.logs.findIndex(l => l.id === logId);
            if (index > -1 && newTimestampStr) {
                state.logs[index].timestamp = new Date(newTimestampStr).toISOString();
                saveData();
                playSound('click');
                renderStats();
            }
        }

        function showMilestone(v) { state.lastMilestone = v; document.getElementById('milestone-value').innerText = v; document.getElementById('milestone-modal').classList.remove('hidden'); playSound('success'); }
        function closeMilestone() { document.getElementById('milestone-modal').classList.add('hidden'); }
        function updateUI() { document.getElementById('total-points').innerText = state.totalPoints.toLocaleString(); const pct = (state.totalPoints % 500) / 5; document.getElementById('level-progress-bar').style.width = `${pct}%`; const diff = 501 - (state.totalPoints % 500); document.getElementById('next-level-info').innerText = `+${diff}`; }

        function toggleView() {
            if (state.view === 'master') { toggleMasterView(); return; }
            state.view = state.view === 'action' ? 'stats' : 'action';
            document.getElementById('action-view').classList.toggle('hidden', state.view !== 'action');
            document.getElementById('stats-view').classList.toggle('hidden', state.view !== 'stats');
            const icon = document.getElementById('view-icon'); const btn = document.getElementById('toggle-view-btn');
            if (state.view === 'stats') { icon.setAttribute('data-lucide', 'layout-grid'); btn.classList.replace('bg-lime-500', 'bg-blue-500'); renderStats(); } 
            else { icon.setAttribute('data-lucide', 'bar-chart-3'); btn.classList.replace('bg-blue-500', 'bg-lime-500'); }
            lucide.createIcons(); playSound('click');
        }

        function toggleMasterView() {
            const masterEl = document.getElementById('master-view');
            const isOpening = masterEl.classList.contains('-translate-y-full');
            if (isOpening) {
                state.view = 'master';
                masterEl.classList.remove('hidden');
                masterEl.classList.remove('-translate-y-full');
                renderMasterView();
                playSound('click');
            } else {
                state.view = 'action';
                masterEl.classList.add('-translate-y-full');
                playSound('click');
            }
            lucide.createIcons();
        }

        function renderStats() {
            const list = document.getElementById('history-list'); list.innerHTML = ''; 
            const now = new Date(); 
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            
            const fourDaysAgoStart = todayStart - (3 * 24 * 60 * 60 * 1000); 
            const sevenDaysAgoStart = todayStart - (6 * 24 * 60 * 60 * 1000);
            
            let weeklyTotal = 0; let todayPoints = 0; let todayCount = 0;
            
            state.logs.forEach(l => { 
                const logTime = new Date(l.timestamp).getTime(); 
                if (isNaN(logTime)) return;
                if (logTime >= sevenDaysAgoStart) weeklyTotal += l.points; 
                if (logTime >= todayStart) { todayPoints += l.points; todayCount++; } 
            });
            
            document.getElementById('weekly-total').innerText = weeklyTotal.toLocaleString(); 
            document.getElementById('daily-average').innerText = todayCount > 0 ? (todayPoints / todayCount).toFixed(1) : "0.0";
            
            const filteredLogs = state.logs.filter(l => {
                const logTime = new Date(l.timestamp).getTime();
                return !isNaN(logTime) && (logTime >= fourDaysAgoStart || logTime >= todayStart);
            });
            
            if (state.logs.length === 0) {
                list.innerHTML = '<div class="text-center p-12 text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] opacity-40">Connecting to Intelligence Hub...</div>';
            } else if (filteredLogs.length === 0) {
                state.logs.slice(-5).reverse().forEach(l => renderLogItem(l, list));
            } else {
                [...filteredLogs].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).forEach(l => renderLogItem(l, list));
            }
        }

        function renderLogItem(l, list) {
            const dateObj = new Date(l.timestamp);
            if (isNaN(dateObj.getTime())) return;

            const localISOTime = new Date(dateObj.getTime() - dateObj.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

            let colorClass = l.colorClass || state.actions.find(a => a.id === l.actionId)?.color || 'from-slate-800 to-slate-900';
            const container = document.createElement('div'); container.className = 'log-item-container';
            container.innerHTML = `
                <div class="delete-btn-bg" onclick="deleteLog(${l.id})">DELETE</div>
                <div class="log-item-content flex justify-between items-center p-3 bg-gradient-to-r ${colorClass} border-b border-black/20 shadow-sm" id="log-${l.id}">
                    <div class="flex flex-col flex-1">
                        <div class="flex items-center gap-2">
                            <span class="text-[14px] font-black text-white shrink-0">${l.label}</span>
                            <input type="datetime-local" value="${localISOTime}" 
                                   onchange="updateLogTimestamp(${l.id}, this.value)" 
                                   class="bg-transparent text-[11px] font-bold text-white/80 border-none p-0 outline-none tabular-nums focus:text-white transition-colors">
                        </div>
                        <span class="text-[10px] text-white/90 uppercase font-black tracking-widest leading-none mt-1">${l.target}</span>
                    </div>
                    <span class="font-black text-white text-[15px] tracking-tighter tabular-nums ml-2">+${l.points}</span>
                </div>`;
            
            const content = container.querySelector('.log-item-content'); let startX = 0; let currentTranslate = 0;
            content.addEventListener('touchstart', e => { 
                if (e.target.tagName === 'INPUT') return;
                startX = e.touches[0].clientX; content.style.transition = 'none'; 
            });
            content.addEventListener('touchmove', e => { 
                if (e.target.tagName === 'INPUT') return;
                const diff = e.touches[0].clientX - startX; 
                if (diff < 0) { currentTranslate = Math.max(diff, -100); content.style.transform = `translateX(${currentTranslate}px)`; } 
            });
            content.addEventListener('touchend', e => { 
                if (e.target.tagName === 'INPUT') return;
                content.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)'; 
                if (currentTranslate < -70) { content.style.transform = 'translateX(-100px)'; } else { content.style.transform = 'translateX(0)'; } 
            });
            list.appendChild(container);
        }

        function renderMasterView() {
            const list = document.getElementById('master-list'); list.innerHTML = '';
            state.actions.forEach((action, index) => {
                const item = document.createElement('div'); item.className = `p-5 rounded-2xl bg-gradient-to-r ${action.color} border border-white/20 shadow-xl`;
                item.innerHTML = `<div class="flex items-center gap-3 mb-4"><i data-lucide="${action.icon}" class="w-5 h-5 text-white"></i><span class="text-[11px] font-black text-white uppercase tracking-[0.2em] opacity-80">${action.id}</span></div><div class="grid grid-cols-2 gap-4"><div class="flex flex-col gap-1.5"><label class="text-[9px] font-bold text-white/70 uppercase tracking-widest">Label</label><input type="text" value="${action.label}" onchange="updateAction(${index}, 'label', this.value)" class="master-input"></div><div class="flex flex-col gap-1.5"><label class="text-[9px] font-bold text-white/70 uppercase tracking-widest">Points</label><input type="number" value="${action.points}" onchange="updateAction(${index}, 'points', this.value)" class="master-input"></div></div>`;
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        function updateAction(index, key, value) { if (key === 'points') value = parseInt(value) || 0; state.actions[index][key] = value; saveData(); renderButtons(); playSound('click'); }

        window.onload = init;
    </script>
</body>
</html>
