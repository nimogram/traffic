<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        :root {
            --base-black: #0a0a0a;
            --accent-lime: #84cc16;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--base-black);
            color: #f8fafc;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Glassmorphism 2.0 - Liquid Glass */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .theme-glow {
            box-shadow: 0 0 30px rgba(132, 204, 22, 0.1);
        }

        .btn-gradient {
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-gradient::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        .active-tap:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        /* Typewriter Effect for AI output */
        .typewriter::after {
            content: '|';
            animation: blink 1s step-end infinite;
            color: var(--accent-lime);
        }

        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-entry {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        #level-progress-bar {
            transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .log-item-container {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            margin-bottom: 10px;
        }

        .log-item-content {
            position: relative;
            z-index: 2;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .delete-btn-bg {
            position: absolute; right: 0; top: 0; bottom: 0; width: 100px;
            background-color: #ef4444; color: white;
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 20px; z-index: 1; border-radius: 16px;
            font-weight: 900; font-size: 10px; letter-spacing: 0.1em;
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
        }
    </style>
</head>

                        <button onclick="toggleMute()" class="p-2.5 rounded-2xl bg-white/5 border border-white/10 active-tap">
                            <i id="mute-icon" data-lucide="volume-2" class="w-4 h-4 text-slate-400"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-black/40 rounded-2xl p-4 border border-white/5">
                <div class="flex justify-between items-end mb-2">
                    <div>
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Strategy Stage</p>

                    <div id="level-progress-bar" class="h-full bg-gradient-to-r from-lime-600 to-lime-300 rounded-full shadow-[0_0_15px_rgba(132,204,22,0.5)]" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- AI ADVISOR (Liquid Glass) -->
        <div id="advisor-box" class="liquid-glass p-5 rounded-[2rem] flex items-start gap-4 shrink-0 animate-entry" style="animation-delay: 0.2s">
            <div class="w-12 h-12 rounded-2xl bg-lime-500/10 border border-lime-500/20 flex items-center justify-center text-lime-400 shrink-0 shadow-inner">
                <i data-lucide="shield-check" class="w-7 h-7"></i>
            </div>
            <div class="flex-1 min-h-[60px]">
                <p class="text-[10px] font-black text-lime-500 uppercase tracking-[0.2em] mb-2 opacity-80">Intelligence Advisory</p>
                <p id="advisor-text" class="text-[15px] font-bold text-white leading-relaxed tracking-tight typewriter">Initializing Cognitive OS...</p>

        <!-- ACTION GRID -->
        <div id="action-view" class="flex-1 grid grid-cols-2 gap-3 overflow-y-auto pr-1 content-start"></div>

        <!-- STATS VIEW -->
        <div id="stats-view" class="hidden flex-1 flex flex-col gap-4 overflow-y-auto">
            <div class="grid grid-cols-2 gap-3">
                <div class="liquid-glass p-4 rounded-3xl text-center">
                    <p class="text-[10px] font-black text-slate-500 uppercase mb-1">Weekly Momentum</p>
                    <p id="weekly-total" class="text-2xl font-black text-lime-400">0</p>

        <!-- FLOATING ACTION BUTTON -->
        <button id="toggle-view-btn" onclick="toggleView()" class="fixed bottom-10 right-6 w-16 h-16 bg-lime-500 text-black rounded-3xl shadow-[0_15px_40px_rgba(132,204,22,0.4)] flex items-center justify-center active-tap z-50">
            <i id="view-icon" data-lucide="bar-chart-3" class="w-7 h-7"></i>
        </button>

        <!-- MASTER SETTINGS -->
        <div id="master-view" class="hidden fixed inset-0 z-[100] bg-black/90 backdrop-blur-xl p-8 flex flex-col overflow-y-auto transform translate-y-full transition-transform duration-500">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-black text-white uppercase tracking-widest">System Maintenance</h3>
                <button onclick="toggleMasterView()" class="p-4 bg-white/10 rounded-full active-tap"><i data-lucide="x" class="w-6 h-6"></i></button>

            <div id="master-list" class="space-y-4"></div>
        </div>

        <!-- DETAIL PANEL (Slide-in) -->
        <div id="detail-panel" class="fixed inset-0 z-50 flex justify-end pointer-events-none overflow-hidden">
            <div id="panel-backdrop" class="absolute inset-0 bg-black/80 opacity-0 transition-opacity"></div>
            <div id="panel-content" class="w-[90%] h-full liquid-glass border-l border-white/10 p-8 transform translate-x-full transition-transform duration-400 pointer-events-auto flex flex-col gap-8">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 id="panel-title" class="text-2xl font-black text-white">Execution Log</h2>
                        <p id="panel-points" class="text-lime-400 font-black mt-1 text-3xl">+10 EXP</p>
                    </div>
                    <button onclick="closePanel()" class="p-3 bg-white/10 rounded-full active-tap"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <div class="space-y-8">
                    <div>
                        <p class="text-xs font-black text-white/50 uppercase tracking-widest mb-4">Select Target</p>
                        <div id="target-selector" class="grid grid-cols-2 gap-3">
                            <button onclick="selectTarget('AKS')" class="target-opt bg-white/5 border border-white/10 rounded-2xl py-4 text-xs font-bold text-white active-tap">AKS</button>
                            <button onclick="selectTarget('YSD')" class="target-opt bg-white/5 border border-white/10 rounded-2xl py-4 text-xs font-bold text-white active-tap">YSD</button>
                            <button onclick="selectTarget('YKO')" class="target-opt bg-white/5 border border-white/10 rounded-2xl py-4 text-xs font-bold text-white active-tap">YKO</button>
                            <button onclick="selectTarget('BODY')" class="target-opt bg-white/5 border border-white/10 rounded-2xl py-4 text-xs font-bold text-white active-tap">HEALTH</button>
                        </div>
                    </div>
                    <textarea id="log-memo" rows="5" placeholder="メモを入力（自動保存）..." class="w-full bg-black/40 border border-white/10 rounded-2xl p-5 text-sm text-white focus:border-lime-500/50 outline-none"></textarea>
                </div>
                <button onclick="saveLog()" class="mt-auto w-full bg-lime-500 text-black font-black py-5 rounded-2xl text-lg active-tap">COMMIT ENTRY</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz-Lk_8UhahzIlmYDtf6Dh5N_B53cJUUnlm6Ig5MwHvtPO7J4IZ2gXiNo8imHvPHiEh9g/exec"; 

        const DEFAULT_ACTIONS = [
            { id: 'pillow', label: '枕詞', points: 10, icon: 'message-square', color: 'from-cyan-500 to-blue-600' },
            { id: 'gym', label: 'GYM', points: 20, icon: 'dumbbell', color: 'from-indigo-500 to-violet-600' },
            { id: 'buffer', label: '3秒待機', points: 10, icon: 'cpu', color: 'from-fuchsia-500 to-purple-600' },
            { id: 'network', label: '雑談', points: 15, icon: 'users', color: 'from-emerald-500 to-teal-600' },
            { id: 'thanks_daily', label: 'ありがとう', points: 5, icon: 'heart', color: 'from-pink-500 to-rose-600' },
            { id: 'stairs', label: '階段利用', points: 5, icon: 'trending-up', color: 'from-orange-500 to-rose-500' },
            { id: 'thanks_pub', label: '称賛', points: 30, icon: 'trophy', color: 'from-yellow-500 to-orange-600' },
            { id: 'bike', label: '自転車通勤', points: 10, icon: 'bike', color: 'from-lime-500 to-emerald-500' }
        ];

        const ADVISORY_DATABASE = [
            "✨ 相手の話を聞く時はスマホを伏せる。その動作が『あなたを最優先に処理している』という最高のアナウンスになります。",
            "✨ PC作業中に誰かが近づいたら一度手を止め、3秒だけ相手に視線を向ける。これで『割り込みOK』のフラグが立ちます。",
            "✨ 挨拶に『北海道の寒さ』を一言添える。その5秒の余白が、相手の警戒心をデフラグします。",
            "✨ 忙しい時ほど表情筋を0.5ミリ緩める。ニモさんのオーラが『威圧』から『安心』に変換されます。",
            "🎯 相手の『なぜ』を先に理解することが、最速の合意形成への近道ですよ。",
            "沈黙の3秒は、相手が本音を話すための『招待状』です。",
            "筋肥大は、将来のニモさんへの最高密度の断熱材。1レップの配当を楽しみましょう。",
            "『少しお力添えいただけますか？』で、相手の自尊心を刺激し、味方に引き込みましょう。"
        ];

        let state = { totalPoints: 0, currentLevel: 1, isMuted: false, currentAction: null, selectedTarget: null, view: 'action', logs: [], actions: [], bonusActive: false };
        let audioCtx = null;
        let typewriterTimeout = null;

        // Dynamic Difficulty Adjustment (DDA) - Logistic Model
        function getExpRequiredForLevel(lv) {
            // Level up difficulty increases using a logistic-like progression
            const K = 2000; // Max gap cap
            const r = 0.5; // Growth rate
            return Math.floor(500 + (K / (1 + Math.exp(-r * (lv - 5)))));
        }

        function init() { loadData(); lucide.createIcons(); renderButtons(); updateUI(); startAdvisor(); syncFromGas(); checkComebackMechanic(); }
        
        function loadData() {
            const saved = localStorage.getItem('eq_logic_v11');
            if (saved) {
                const p = JSON.parse(saved);
                state.totalPoints = p.totalPoints || 0;
                state.logs = p.logs || [];
                state.actions = p.actions || DEFAULT_ACTIONS;
            } else { state.actions = DEFAULT_ACTIONS; }
        }

        function saveData() { localStorage.setItem('eq_logic_v11', JSON.stringify({ totalPoints: state.totalPoints, logs: state.logs, actions: state.actions })); }

        async function syncFromGas() {
            try {
                const res = await fetch(GAS_WEBAPP_URL);
                const cloudLogs = await res.json();
                if (Array.isArray(cloudLogs)) {
                    state.logs = cloudLogs.map((l, i) => ({
                        id: i, label: l.label, points: l.points, target: l.target, timestamp: l.timestamp,
                        colorClass: state.actions.find(a => a.label === l.label)?.color || 'from-slate-800'
                    }));
                    state.totalPoints = cloudLogs.reduce((s, l) => s + l.points, 0);
                    saveData(); updateUI();
                }
            } catch (e) { console.error("Sync Error:", e); }
        }

        function checkComebackMechanic() {
            if (state.logs.length === 0) return;
            const lastLogTime = new Date(state.logs[0].timestamp).getTime();
            const now = Date.now();
            if (now - lastLogTime > 24 * 60 * 60 * 1000) {
                state.bonusActive = true;
                showAdvisor("✨ お帰りなさい、ニモさん。24時間ぶりの再稼働ですね。継続リソース復旧のため、次回EXPを倍増させます。");
            }
        }

        function showAdvisor(txt) {
            const el = document.getElementById('advisor-text');
            if (typewriterTimeout) clearTimeout(typewriterTimeout);
            el.innerText = '';
            let i = 0;
            function type() {
                if (i < txt.length) { el.innerText += txt.charAt(i); i++; typewriterTimeout = setTimeout(type, 50); }
            }
            type();
        }

        function startAdvisor() {
            setInterval(() => {
                if (state.view === 'action') showAdvisor(ADVISORY_DATABASE[Math.floor(Math.random() * ADVISORY_DATABASE.length)]);
            }, 12000);
            showAdvisor(ADVISORY_DATABASE[0]);
        }

        function playSound(type) {
            if (state.isMuted) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'click') {
                o.type = 'sine'; o.frequency.setValueAtTime(1000, now); o.frequency.exponentialRampToValueAtTime(400, now + 0.1);
                g.gain.setValueAtTime(0.05, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                o.start(now); o.stop(now + 0.1);
            }
        }

        function renderButtons() {
            const container = document.getElementById('action-view'); container.innerHTML = '';
            state.actions.forEach((a, i) => {
                const btn = document.createElement('button');
                btn.className = `bg-gradient-to-br ${a.color} btn-gradient rounded-3xl flex flex-col justify-between p-4 active-tap animate-entry shadow-lg h-[100px] border border-white/10`;
                btn.style.animationDelay = `${0.3 + i * 0.05}s`;
                btn.onclick = () => {
                    playSound('click'); state.currentAction = a;
                    if (['gym', 'stairs', 'bike'].includes(a.id)) { state.selectedTarget = 'BODY'; saveLog(""); }
                    else openPanel(a);
                };
                btn.innerHTML = `
                    <div class="flex justify-between items-start w-full">
                        <i data-lucide="${a.icon}" class="w-5 h-5 text-white/80"></i>
                        <span class="text-[10px] font-black text-white/50 tracking-widest uppercase">+${a.points}</span>
                    </div>
                    <span class="text-sm font-black text-white text-left tracking-tighter">${a.label}</span>
                `;
                container.appendChild(btn);
            });
            lucide.createIcons();
        }

        function updateUI() {
            let pts = state.totalPoints;
            let lv = 1;
            while (pts >= getExpRequiredForLevel(lv)) {
                pts -= getExpRequiredForLevel(lv);
                lv++;
            }
            state.currentLevel = lv;
            const req = getExpRequiredForLevel(lv);
            document.getElementById('total-points').innerText = state.totalPoints.toLocaleString();
            document.getElementById('level-badge').innerText = `Lv.${lv} ${lv >= 10 ? 'Strategic Master' : 'Specialist'}`;
            document.getElementById('next-level-info').innerText = `+${req - pts}`;
            document.getElementById('level-progress-bar').style.width = `${(pts / req) * 100}%`;
        }

        function toggleView() {
            state.view = state.view === 'action' ? 'stats' : 'action';
            document.getElementById('action-view').classList.toggle('hidden', state.view !== 'action');
            document.getElementById('stats-view').classList.toggle('hidden', state.view !== 'stats');
            const icon = document.getElementById('view-icon');
            icon.setAttribute('data-lucide', state.view === 'stats' ? 'layout-grid' : 'bar-chart-3');
            if (state.view === 'stats') renderStats();
            lucide.createIcons(); playSound('click');
        }

        function openPanel(a) {
            state.selectedTarget = null;
            document.getElementById('panel-title').innerText = `${a.label} Execution`;
            document.getElementById('panel-points').innerText = `+${a.points} EXP`;
            document.getElementById('detail-panel').classList.remove('pointer-events-none');
            document.getElementById('panel-content').classList.remove('translate-x-full');
            document.getElementById('panel-backdrop').style.opacity = '1';
        }

        function closePanel() {
            document.getElementById('panel-content').classList.add('translate-x-full');
            document.getElementById('panel-backdrop').style.opacity = '0';
            setTimeout(() => document.getElementById('detail-panel').classList.add('pointer-events-none'), 400);
        }

        function selectTarget(t) {
            state.selectedTarget = t; playSound('click');
            document.querySelectorAll('.target-opt').forEach(btn => {
                btn.style.borderColor = btn.innerText.includes(t==='BODY'?'HEALTH':t) ? 'var(--accent-lime)' : 'rgba(255,255,255,0.1)';
                btn.style.background = btn.innerText.includes(t==='BODY'?'HEALTH':t) ? 'rgba(132, 204, 22, 0.1)' : 'rgba(255,255,255,0.05)';
            });
        }

        function saveLog(memo = null) {
            const a = state.currentAction;
            const target = state.selectedTarget || 'BODY';
            const pts = state.bonusActive ? a.points * 2 : a.points;
            if (state.bonusActive) state.bonusActive = false;

            const log = { id: Date.now(), label: a.label, points: pts, target: target, timestamp: new Date().toISOString(), colorClass: a.color };
            state.logs.unshift(log);
            state.totalPoints += pts;
            
            fetch(GAS_WEBAPP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ ...log, memo: memo || document.getElementById('log-memo').value }) });
            
            saveData(); updateUI(); closePanel();
        }

        function renderStats() {
            const list = document.getElementById('history-list'); list.innerHTML = '';
            const today = new Date().setHours(0,0,0,0);
            const fourDaysAgo = today - (3 * 24 * 60 * 60 * 1000);
            
            const filtered = state.logs.filter(l => new Date(l.timestamp).getTime() >= fourDaysAgo);
            filtered.forEach(l => {
                const container = document.createElement('div'); container.className = 'log-item-container liquid-glass';
                const timeStr = new Date(new Date(l.timestamp).getTime() - new Date().getTimezoneOffset()*60000).toISOString().slice(0, 16);
                container.innerHTML = `
                    <div class="delete-btn-bg">DELETE</div>
                    <div class="log-item-content flex justify-between items-center p-4 bg-gradient-to-r ${l.colorClass} border-b border-white/5">
                        <div class="flex flex-col">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-black text-white">${l.label}</span>
                                <input type="datetime-local" step="1800" value="${timeStr}" class="bg-transparent text-[10px] text-white/50 border-none p-0 outline-none">
                            </div>
                            <span class="text-[10px] font-black text-white/40 uppercase tracking-widest mt-1">${l.target}</span>
                        </div>
                        <span class="text-lg font-black text-white">+${l.points}</span>
                    </div>
                `;
                list.appendChild(container);
            });
        }

        function toggleMasterView() {
            const m = document.getElementById('master-view');
            const open = m.classList.contains('translate-y-full');
            if (open) { m.classList.remove('hidden'); setTimeout(() => m.classList.remove('translate-y-full'), 10); renderMaster(); }
            else { m.classList.add('translate-y-full'); setTimeout(() => m.classList.add('hidden'), 500); }
            playSound('click');
        }

        function renderMaster() {
            const list = document.getElementById('master-list'); list.innerHTML = '';
            state.actions.forEach((a, i) => {
                const item = document.createElement('div'); item.className = `p-5 rounded-3xl liquid-glass border-white/10`;
                item.innerHTML = `
                    <div class="flex items-center gap-3 mb-4"><i data-lucide="${a.icon}" class="w-5 h-5 text-lime-500"></i><span class="text-xs font-black text-white uppercase">${a.label}</span></div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" value="${a.label}" class="bg-black/50 border border-white/10 rounded-xl p-3 text-xs text-white">
                        <input type="number" value="${a.points}" class="bg-black/50 border border-white/10 rounded-xl p-3 text-xs text-white">
                    </div>
                `;
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
