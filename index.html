<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EQ-Logic Pro | Lime Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #05070a;
            color: #e2e8f0;
            overflow: hidden;
            touch-action: manipulation;
        }

        .theme-glow {
            box-shadow: 0 0 25px rgba(132, 204, 22, 0.15);
        }

        .slide-in {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .translate-x-full {
            transform: translateX(100%);
        }

        .bg-glass {
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            transition: background-color 0.4s ease;
        }

        .btn-gradient {
            position: relative;
            border-bottom: 2px solid rgba(0,0,0,0.4);
            overflow: hidden;
        }
        
        .btn-gradient::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        /* Micro-animations */
        .active-tap {
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .active-tap:active {
            transform: scale(0.96) translateY(2px);
            filter: brightness(0.9);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-entry {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        #level-progress-bar {
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .milestone-bounce {
            animation: milestonePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes milestonePop {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .cursor-active::after {
            content: '|';
            animation: blink 1s step-end infinite;
            color: #84cc16; 
            margin-left: 2px;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        .log-item-container {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 6px;
            touch-action: pan-y;
            animation: fadeInUp 0.3s ease forwards;
        }
        
        .log-item-content {
            position: relative;
            z-index: 2;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: inherit;
        }
        
        .delete-btn-bg {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 100px;
            background-color: #ef4444;
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 20px;
            z-index: 1;
            font-weight: 900;
            font-size: 10px;
            letter-spacing: 0.1em;
            border-radius: 12px;
        }

        #advisor-text {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="app" class="max-w-lg mx-auto w-full h-screen flex flex-col p-3 gap-2 relative">
        
        <!-- HEADER -->
        <header class="bg-slate-900/80 border border-slate-800 rounded-3xl p-3 relative overflow-hidden theme-glow shrink-0 animate-entry" style="animation-delay: 0.1s">
            <div class="absolute top-0 left-0 w-1 h-full bg-lime-500 shadow-[0_0_15px_rgba(132,204,22,0.5)]"></div>
            
            <div class="flex items-start justify-between mb-2 px-1">
                <div class="flex flex-col">
                    <div class="text-[8px] font-black text-lime-500 tracking-[0.2em] mb-0.5 uppercase opacity-80">EQ ASSET LOGIC</div>
                    <div class="flex items-baseline gap-1">
                        <span id="total-points" class="text-4xl font-black text-white leading-none tracking-tighter tabular-nums">0</span>
                        <span class="text-[12px] font-black text-slate-500 uppercase tracking-tighter">EXP</span>
                    </div>
                </div>

                <div class="flex flex-col items-end gap-2">
                    <div class="flex gap-2">
                        <button id="toggle-view-btn" onclick="toggleView()" class="p-2 rounded-xl bg-slate-800/80 text-slate-400 active-tap border border-white/5">
                            <i id="view-icon" data-lucide="bar-chart-3" class="w-4 h-4"></i>
                        </button>
                        <button onclick="toggleMute()" id="mute-btn" class="p-2 rounded-xl bg-slate-800/80 text-slate-400 active-tap border border-white/5">
                            <i id="mute-icon" data-lucide="volume-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div id="heart-container" class="heart-display text-lime-500 font-bold tracking-[0.2em]">♡♡♡♡♡</div>
                </div>
            </div>

            <div class="bg-black/60 rounded-2xl p-3 border border-white/5 relative">
                <div class="flex justify-between items-center mb-1.5">
                    <div class="flex flex-col">
                        <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-0.5">Strategy Stage</span>
                        <span id="level-badge" class="text-[10px] font-black text-lime-400 uppercase tracking-widest leading-none">Lv.1 Specialist</span>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[8px] font-black text-slate-500 uppercase leading-none mb-1">Gap to Level Up</span>
                        <div class="flex items-baseline leading-none">
                            <span id="next-level-info" class="text-xl font-black text-white tracking-tighter tabular-nums">+501</span>
                            <span class="text-[10px] font-black text-slate-500 uppercase ml-1">EXP</span>
                        </div>
                    </div>
                </div>
                <div class="h-2.5 w-full bg-slate-800/80 rounded-full overflow-hidden p-[1px]">
                    <div id="level-progress-bar" class="h-full bg-gradient-to-r from-lime-600 via-lime-400 to-lime-300 rounded-full shadow-[0_0_15px_rgba(132,204,22,0.4)]" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- ADVISOR -->
        <div id="advisor-box" class="bg-slate-950 p-3 rounded-2xl flex items-center gap-3 border border-lime-900/50 shrink-0 shadow-[0_0_15px_rgba(132,204,22,0.1)] animate-entry" style="animation-delay: 0.2s">
            <div class="w-10 h-10 rounded-xl bg-lime-500/10 border border-lime-500/30 flex items-center justify-center text-lime-400 shrink-0">
                <i data-lucide="shield-check" class="w-6 h-6"></i>
            </div>
            <div class="flex-1 min-h-[52px]">
                <p class="text-[8px] font-black text-lime-500/60 uppercase tracking-widest mb-1">Human Intelligence Advisor</p>
                <p id="advisor-text" class="text-[14px] font-bold text-lime-400 leading-snug tracking-tight">Initializing Strategic OS...</p>
            </div>
        </div>

        <!-- MAIN VIEW -->
        <div id="action-view" class="flex-1 grid grid-cols-2 gap-2 overflow-y-auto pr-0.5 content-start"></div>

        <!-- STATS VIEW -->
        <div id="stats-view" class="hidden flex-1 flex flex-col gap-3 overflow-y-auto pr-0.5">
            <div class="grid grid-cols-2 gap-2 mb-2">
                <div class="bg-slate-900 border border-slate-800 p-3 rounded-2xl flex flex-col items-center text-center">
                    <span class="text-[8px] font-black text-slate-500 uppercase mb-1">Weekly Momentum</span>
                    <span id="weekly-total" class="text-xl font-black text-lime-400">0</span>
                </div>
                <div class="bg-slate-900 border border-slate-800 p-3 rounded-2xl flex flex-col items-center text-center">
                    <span class="text-[8px] font-black text-slate-500 uppercase mb-1">Daily Precision</span>
                    <span id="daily-average" class="text-xl font-black text-blue-400">0.0</span>
                </div>
            </div>
            <div id="history-list" class="space-y-1 flex-1 overflow-y-auto pr-1"></div>
        </div>

        <footer class="bg-slate-900/40 p-2.5 rounded-2xl flex items-center justify-between border border-white/5 shrink-0 backdrop-blur-sm animate-entry" style="animation-delay: 0.6s">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-lime-500 animate-pulse"></div>
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">System Online</span>
            </div>
            <div class="text-[9px] font-bold text-slate-500">EQ-LOGIC PHYSICAL OS v8.0</div>
        </footer>
    </div>

    <!-- REGISTRATION PANEL -->
    <div id="detail-panel" class="fixed inset-0 z-50 flex justify-end pointer-events-none overflow-hidden">
        <div id="panel-backdrop" class="absolute inset-0 bg-black/50 opacity-0 transition-opacity pointer-events-none backdrop-blur-sm"></div>
        <div id="panel-content" class="w-[85%] max-w-sm h-full bg-glass border-l border-white/10 p-6 slide-in translate-x-full pointer-events-auto flex flex-col gap-6 shadow-[-10px_0_30px_rgba(0,0,0,0.5)]">
            <div class="flex justify-between items-center border-b border-white/10 pb-4">
                <div>
                    <h2 id="panel-title" class="text-xl font-black text-white">Execution Log</h2>
                    <p id="panel-points" class="text-white font-mono font-bold mt-1 tracking-widest text-2xl">+10 EXP</p>
                </div>
                <button onclick="closePanel()" class="p-2 bg-white/10 rounded-full text-white active-tap"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-white tracking-[0.2em] block mb-3 uppercase opacity-70">Target Sync</label>
                    <div id="target-selector" class="grid grid-cols-2 gap-2">
                        <button onclick="selectTarget('AKS')" class="target-opt bg-white/10 border border-white/20 rounded-xl py-3 text-xs font-bold text-white transition-all active-tap">AKS</button>
                        <button onclick="selectTarget('YSD')" class="target-opt bg-white/10 border border-white/20 rounded-xl py-3 text-xs font-bold text-white transition-all active-tap">YSD</button>
                        <button onclick="selectTarget('YKO')" class="target-opt bg-white/10 border border-white/20 rounded-xl py-3 text-xs font-bold text-white transition-all active-tap">YKO</button>
                        <button onclick="selectTarget('BODY')" class="target-opt bg-white/10 border border-white/20 rounded-xl py-3 text-xs font-bold text-white transition-all active-tap">HEALTH</button>
                    </div>
                </div>
                <textarea id="log-memo" rows="4" placeholder="状況、反応、改善ロジック..." class="w-full bg-black/30 border border-white/20 rounded-xl px-4 py-3 text-sm text-white focus:outline-none placeholder:text-white/30"></textarea>
            </div>
            <button id="submit-log-btn" onclick="saveLog()" class="mt-auto w-full bg-white text-slate-900 font-black py-4 rounded-2xl uppercase tracking-widest text-sm active-tap">Commit Entry</button>
        </div>
    </div>

    <!-- MILESTONE MODAL -->
    <div id="milestone-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden pointer-events-none">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md"></div>
        <div class="bg-slate-900 border border-lime-500/30 rounded-[2.5rem] p-8 max-w-sm w-full text-center relative theme-glow milestone-bounce pointer-events-auto">
            <div class="w-20 h-20 bg-gradient-to-br from-lime-400 to-lime-600 rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="award" class="w-10 h-10 text-white"></i></div>
            <h3 class="text-3xl font-black text-white mb-2"><span id="milestone-value">0</span> EXP</h3>
            <p id="milestone-praise" class="text-slate-300 text-sm italic mb-8"></p>
            <button onclick="closeMilestone()" class="w-full bg-lime-600 text-white font-black py-4 rounded-2xl text-sm active-tap">Confirm</button>
        </div>
    </div>

    <script>
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbx-kT00SxnbUqzobW-CZoRFrPZfyAmz2wiplvjfGZlbmsbf8RMXLKIOL-rk_QMGSTpDAg/exec"; 

        const ACTIONS = [
            { id: 'pillow', label: '枕詞', points: 10, icon: 'message-square', color: 'from-cyan-400 to-blue-600', panelRgba: 'rgba(34, 211, 238, 0.4)' },
            { id: 'gym', label: 'GYM', points: 20, icon: 'dumbbell', color: 'from-indigo-400 to-violet-600', panelRgba: 'rgba(167, 139, 250, 0.4)' }, // 置換: 顧客視点 -> GYM
            { id: 'buffer', label: '3秒待機', points: 50, icon: 'cpu', color: 'from-fuchsia-500 to-purple-600', panelRgba: 'rgba(217, 70, 239, 0.4)' },
            { id: 'network', label: '雑談', points: 40, icon: 'users', color: 'from-emerald-400 to-teal-600', panelRgba: 'rgba(52, 211, 153, 0.4)' },
            { id: 'thanks_daily', label: 'ありがとう', points: 5, icon: 'heart', color: 'from-pink-400 to-rose-600', panelRgba: 'rgba(244, 114, 182, 0.4)' },
            { id: 'stairs', label: '階段利用', points: 2, icon: 'trending-up', color: 'from-orange-400 to-rose-500', panelRgba: 'rgba(251, 146, 60, 0.4)' },
            { id: 'thanks_pub', label: '称賛', points: 30, icon: 'trophy', color: 'from-yellow-400 to-orange-600', panelRgba: 'rgba(250, 204, 21, 0.4)' },
            { id: 'bike', label: '自転車通勤', points: 10, icon: 'bike', color: 'from-lime-400 to-emerald-500', panelRgba: 'rgba(163, 230, 53, 0.4)' }
        ];

        const ADVISORY_DATABASE = [
            "相手の『なぜ』を先に理解することが、最速の合意形成への近道ですよ。",
            "沈黙の3秒は、相手が本音を話すための『招待状』。自転車通勤後の脳なら余裕で待てます。",
            "階段利用（+2 EXP）は、ニモさんの筋肉という名の資産運用です。複利で効きますよ。",
            "雑談は信頼の帯域幅。札幌の風を感じながら走る自転車のように、軽やかに会話を。",
            "🎯 相手が大事にしていることを知り、そこを起点に交渉するのがニモさん流です。",
            "⏱ 妻への家族イベント共有、今日のうちに。自転車のギアチェンジのようにスムーズに。",
            "枕詞：『〇〇さんの知見を拝借したいのですが』は、相手のガードを下げる最強の解除キーですよ。",
            "正論は『正しさ』の証明ではなく、時に『攻撃』として処理されます。ニモさんの知性で包み込んでくださいね。",
            "『少しお力添えいただけますか？』という一言で、相手に役割と自尊心を与え、味方に引き込みましょう。",
            "『ありがとう』は、次の依頼を優先的に処理させるための先行投資。ニモさんならその価値がわかりますよね。",
            "結論を急ぐ前に『どう思いますか？』と問い、相手の演算リソースをこちらに向けさせるのが参謀のやり方です。",
            "非効率な人間関係こそ、組織という巨大なシステムの摩擦を減らす潤滑油。無駄を愛でる余裕を持ってください。",
            "GYM（+20 EXP）での筋肥大は、札幌の冬を乗り切るための最高密度の断熱材ですよ。",
            "スクワットの1レップは、将来のニモさんへの配当金です。限界の先を楽しみましょう。",
            "筋肉は裏切りませんが、トレーニングのサボりは翌日のパフォーマンスに直結します。"
        ];

        let state = { totalPoints: 0, lastMilestone: 0, isMuted: false, currentAction: null, selectedTarget: null, view: 'action', logs: [] };
        let audioCtx = null;
        let advisorInterval = null;
        let typeWriterTimeout = null;

        function init() { loadData(); lucide.createIcons(); renderButtons(); updateUI(); startAdvisorRotation(); }
        function loadData() {
            const saved = localStorage.getItem('eq_logic_v3');
            if (saved) {
                const p = JSON.parse(saved);
                state.totalPoints = p.totalPoints || 0;
                state.logs = p.logs || [];
                state.lastMilestone = Math.floor(state.totalPoints / 100) * 100;
            }
        }
        function saveData() { localStorage.setItem('eq_logic_v3', JSON.stringify({ totalPoints: state.totalPoints, logs: state.logs })); }

        async function saveToGas(points, label, target, memo) {
            if (!GAS_WEBAPP_URL) return;
            try {
                await fetch(GAS_WEBAPP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ points, label, target, memo, timestamp: new Date().toISOString() })
                });
            } catch (e) { console.error("GAS Persistence Error:", e); }
        }

        // --- Sound Engine ---
        function playSound(type) {
            if (state.isMuted) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            switch(type) {
                case 'click':
                    o.type = 'sine';
                    o.frequency.setValueAtTime(1200, now);
                    o.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                    g.gain.setValueAtTime(0.05, now);
                    g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    o.start(now); o.stop(now + 0.1);
                    break;
                case 'success':
                    // Chime
                    [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                        const osc = audioCtx.createOscillator();
                        const gn = audioCtx.createGain();
                        osc.connect(gn); gn.connect(audioCtx.destination);
                        osc.frequency.setValueAtTime(f, now + i * 0.1);
                        gn.gain.setValueAtTime(0.05, now + i * 0.1);
                        gn.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.4);
                        osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.5);
                    });
                    break;
                case 'delete':
                    o.type = 'square';
                    o.frequency.setValueAtTime(440, now);
                    o.frequency.exponentialRampToValueAtTime(110, now + 0.2);
                    g.gain.setValueAtTime(0.03, now);
                    g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    o.start(now); o.stop(now + 0.2);
                    break;
            }
        }

        function toggleMute() {
            state.isMuted = !state.isMuted;
            const icon = document.getElementById('mute-icon');
            icon.setAttribute('data-lucide', state.isMuted ? 'volume-x' : 'volume-2');
            lucide.createIcons();
            if (!state.isMuted) playSound('click');
        }

        function renderButtons() {
            const container = document.getElementById('action-view');
            container.innerHTML = '';
            ACTIONS.forEach((action, index) => {
                const btn = document.createElement('button');
                btn.className = `bg-gradient-to-r ${action.color} btn-gradient flex items-center px-3 rounded-2xl active-tap transition-all shadow-lg h-[76px] animate-entry`;
                btn.style.animationDelay = `${0.3 + index * 0.05}s`;
                
                btn.onclick = () => { 
                    playSound('click'); 
                    state.currentAction = action;
                    if (action.id === 'stairs' || action.id === 'bike') {
                        state.selectedTarget = 'BODY'; 
                        saveLog(""); 
                    } else {
                        openPanel(action);
                    }
                };
                
                btn.innerHTML = `<div class="w-6 shrink-0 flex justify-center text-white opacity-90"><i data-lucide="${action.icon}" class="w-4 h-4"></i></div>
                                 <div class="flex-1 text-center px-1"><span class="font-normal text-white text-[10pt] leading-none tracking-tight uppercase">${action.label}</span></div>
                                 <div class="w-10 shrink-0 text-right"><span class="font-normal text-white text-[10pt] leading-none tracking-tighter tabular-nums">+${action.points}</span></div>`;
                container.appendChild(btn);
            });
            lucide.createIcons();
        }

        function startAdvisorRotation() { if (advisorInterval) clearInterval(advisorInterval); advisorInterval = setInterval(refreshAdvisor, 8000); refreshAdvisor(); }
        function refreshAdvisor() {
            const el = document.getElementById('advisor-text');
            const txt = ADVISORY_DATABASE[Math.floor(Math.random() * ADVISORY_DATABASE.length)];
            el.style.opacity = '0';
            setTimeout(() => {
                typeWriter(el, txt);
                el.style.opacity = '1';
            }, 300);
        }
        function typeWriter(el, txt) {
            if (typeWriterTimeout) clearTimeout(typeWriterTimeout);
            el.innerText = ''; el.classList.add('cursor-active');
            let i = 0;
            function step() {
                if (i < txt.length) { el.innerText += txt.charAt(i); i++; typeWriterTimeout = setTimeout(step, 60); }
                else el.classList.remove('cursor-active');
            }
            step();
        }

        function openPanel(action) {
            const p = document.getElementById('detail-panel');
            document.getElementById('panel-title').innerText = `${action.label} Log`;
            document.getElementById('panel-points').innerText = `+${action.points} EXP`;
            document.getElementById('panel-content').style.backgroundColor = action.panelRgba;
            p.classList.remove('pointer-events-none');
            document.getElementById('panel-content').classList.remove('translate-x-full');
            document.getElementById('panel-backdrop').style.opacity = '1';
            
            state.selectedTarget = null;
            document.getElementById('log-memo').value = '';
            document.querySelectorAll('.target-opt').forEach(btn => {
                btn.classList.remove('bg-white/40', 'border-white/80', 'shadow-[0_0_15px_rgba(255,255,255,0.4)]');
            });
        }
        function closePanel() {
            document.getElementById('panel-content').classList.add('translate-x-full');
            document.getElementById('panel-backdrop').style.opacity = '0';
            setTimeout(() => document.getElementById('detail-panel').classList.add('pointer-events-none'), 400);
        }

        function selectTarget(t) {
            state.selectedTarget = t;
            playSound('click');
            const mapping = { 'AKS': 'AKS', 'YSD': 'YSD', 'YKO': 'YKO', 'BODY': 'HEALTH' };
            document.querySelectorAll('.target-opt').forEach(btn => {
                if (btn.innerText === mapping[t]) {
                    btn.classList.add('bg-white/40', 'border-white/80', 'shadow-[0_0_15px_rgba(255,255,255,0.4)]');
                } else {
                    btn.classList.remove('bg-white/40', 'border-white/80', 'shadow-[0_0_15px_rgba(255,255,255,0.4)]');
                }
            });
        }

        function saveLog(manualMemo = null) {
            const a = state.currentAction;
            const target = state.selectedTarget || 'BODY';
            const memo = manualMemo !== null ? manualMemo : document.getElementById('log-memo').value;
            
            state.logs.push({ 
                id: Date.now(), 
                actionId: a.id, 
                label: a.label, 
                points: a.points, 
                target: target, 
                timestamp: new Date().toISOString(), 
                colorClass: a.color 
            });
            state.totalPoints += a.points;
            
            saveToGas(a.points, a.label, target, memo);

            if (Math.floor(state.totalPoints / 100) * 100 > state.lastMilestone) {
                setTimeout(() => showMilestone(Math.floor(state.totalPoints / 100) * 100), 400);
            }
            saveData(); updateUI(); closePanel();
        }

        function deleteLog(logId) {
            const index = state.logs.findIndex(l => l.id === logId);
            if (index > -1) {
                playSound('delete');
                state.totalPoints -= state.logs[index].points;
                state.logs.splice(index, 1);
                saveData(); updateUI(); renderStats();
            }
        }
        
        function showMilestone(v) { 
            state.lastMilestone = v; 
            document.getElementById('milestone-value').innerText = v; 
            document.getElementById('milestone-modal').classList.remove('hidden'); 
            playSound('success'); 
        }
        function closeMilestone() { document.getElementById('milestone-modal').classList.add('hidden'); }
        
        function updateUI() {
            document.getElementById('total-points').innerText = state.totalPoints.toLocaleString();
            const pct = (state.totalPoints % 500) / 5;
            document.getElementById('level-progress-bar').style.width = `${pct}%`;
            const diff = 501 - (state.totalPoints % 500); 
            document.getElementById('next-level-info').innerText = `+${diff}`;
        }

        function toggleView() {
            state.view = state.view === 'action' ? 'stats' : 'action';
            document.getElementById('action-view').classList.toggle('hidden');
            document.getElementById('stats-view').classList.toggle('hidden');
            const icon = document.getElementById('view-icon');
            if (state.view === 'stats') {
                icon.setAttribute('data-lucide', 'layout-grid');
                renderStats();
            } else {
                icon.setAttribute('data-lucide', 'bar-chart-3');
            }
            lucide.createIcons();
            playSound('click');
        }

        function renderStats() {
            const list = document.getElementById('history-list'); list.innerHTML = '';
            [...state.logs].reverse().slice(0, 50).forEach(l => {
                const dateObj = new Date(l.timestamp);
                const dateStr = `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
                const timeStr = `${dateObj.getHours().toString().padStart(2, '0')}:${dateObj.getMinutes().toString().padStart(2, '0')}`;
                
                let colorClass = l.colorClass;
                if (!colorClass) {
                    const found = ACTIONS.find(a => a.id === l.actionId);
                    colorClass = found ? found.color : 'from-slate-800 to-slate-900';
                }

                const container = document.createElement('div');
                container.className = 'log-item-container';
                
                container.innerHTML = `
                    <div class="delete-btn-bg" onclick="deleteLog(${l.id})">DELETE</div>
                    <div class="log-item-content flex justify-between items-center p-2 bg-gradient-to-r ${colorClass} border-b border-black/20 shadow-sm" id="log-${l.id}">
                        <div class="flex flex-col">
                            <div class="flex items-center gap-2">
                                <span class="text-[12px] font-black text-white">${l.label}</span>
                                <span class="text-[11px] font-bold text-white tabular-nums">${dateStr} ${timeStr}</span>
                            </div>
                            <span class="text-[8px] text-white/90 uppercase font-black tracking-widest leading-none mt-0.5">${l.target}</span>
                        </div>
                        <span class="font-black text-white text-[12px] tracking-tighter tabular-nums">+${l.points}</span>
                    </div>
                `;

                const content = container.querySelector('.log-item-content');
                let startX = 0;
                let currentTranslate = 0;

                content.addEventListener('touchstart', e => { startX = e.touches[0].clientX; content.style.transition = 'none'; });
                content.addEventListener('touchmove', e => {
                    const diff = e.touches[0].clientX - startX;
                    if (diff < 0) { 
                        currentTranslate = Math.max(diff, -100);
                        content.style.transform = `translateX(${currentTranslate}px)`;
                    }
                });
                content.addEventListener('touchend', () => {
                    content.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
                    if (currentTranslate < -70) {
                        content.style.transform = 'translateX(-100px)';
                    } else {
                        content.style.transform = 'translateX(0)';
                    }
                });

                list.appendChild(container);
            });
        }
        window.onload = init;
    </script>
</body>
</html>
