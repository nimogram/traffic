<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIPELINE v11.14 - Mobile Square Tactical</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        :root {
            --hpe-green: #01A982;
            --hpe-bg-front: #12171D;
            --solar-yellow: #FDE047;
        }

        body {
            background-color: #05070a; 
            font-family: 'JetBrains Mono', monospace;
            color: #e2e8f0;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        /* PRINT OPTIMIZATION (v11.14) */
        @media print {
            @page { size: A4 landscape; margin: 6mm; }
            body { background: white !important; color: black !important; overflow: visible !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-layout-grid { display: grid !important; grid-template-columns: 460px 1fr !important; gap: 20px; }
            .matrix-container-print { width: 440px !important; height: 440px !important; margin: 0 !important; border: 1px solid #000 !important; }
            .print-table th, .print-table td { font-size: 8px !important; border: 0.5px solid #000 !important; padding: 4px; }
            .bg-highlight-green { background-color: #f0fdf4 !important; }
            .bg-highlight-blue { background-color: #f0f9ff !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        .print-only { display: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .balloon-active {
            box-shadow: 0 0 25px rgba(253, 224, 71, 0.7);
            border-color: #FDE047 !important;
            transform: scale(1.02);
            z-index: 100 !important;
        }

        .matrix-square-container {
            width: 100vw;
            height: 100vw;
            max-width: 100vh;
            max-height: 100vh;
            position: relative;
        }
    </style>
</head>
<body class="h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col min-h-0"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const UNIT_VALUE = 1000000;
        const STATUS_ORDER = ["WON", "COMMIT", "COMMIT WITH RISK", "STRONG UPSIDE", "PIPELINE"];
        const YEARS = ["FY26", "FY27"];
        
        const STATUS_META = {
            WON:                { label: "WON", bg: "#02E0A5", accent: "#10B981" },
            COMMIT:             { label: "COMMIT", bg: "#84CC16", accent: "#A3E635" },
            "COMMIT WITH RISK": { label: "COMMIT W/RISK", bg: "#1e3a8a", accent: "#60a5fa" },
            "STRONG UPSIDE":    { label: "STRONG UPSIDE", bg: "#0ea5e9", accent: "#7dd3fc" },
            PIPELINE:           { label: "PIPELINE", bg: "#4b5563", accent: "#9ca3af" },
        };

        const MONTHS = ["11月","12月","1月","2月","3月","4月","5月","6月","7月","8月","9月","10月"];
        const Q_MAP  = { Q1:["11月","12月","1月"], Q2:["2月","3月","4月"], Q3:["5月","6月","7月"], Q4:["8月","9月","10月"] };
        const STORAGE_KEY = "hpe_pipeline_v11_14_mobile_sq";

        const fmt = (n) => `¥${(Number(n||0)/UNIT_VALUE).toLocaleString()}M`;

        const Ico = {
          Plus: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
          List: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
          Grid: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
          Down: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
          X:    () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
          Up:   () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
          Target: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
          Cloud: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-3.9-4.5-1-4.2-4.7-7-9.1-7-3.9 0-7.2 2.7-8 6.4C.4 10.3 0 11.3 0 12.5 0 15 2 17 4.5 17H5M12 12v9m-4-4l4 4 4-4"/></svg>,
        };

        const App = () => {
          const [deals, setDeals] = useState([
            { "client": "TRH GL 神戸", "amount": 40000000, "status": "WON", "month": "12月", "id": "1772500808369", "year": "FY26" },
            { "client": "TRH GL 印西", "amount": 60000000, "status": "WON", "month": "1月", "id": "1772500823192", "year": "FY26" },
            { "client": "HKDしんきん情報", "amount": 30000000, "status": "WON", "month": "2月", "id": "1772500957209", "year": "FY26" },
            { "client": "HBA 社内", "amount": 18000000, "status": "WON", "month": "2月", "id": "1772501915671", "year": "FY26" },
            { "client": "SPR NEWS-NET SVT+", "amount": 35000000, "status": "COMMIT", "month": "3月", "id": "1772499909607", "year": "FY26" },
            { "client": "HBA DC", "amount": 70000000, "status": "COMMIT WITH RISK", "month": "3月", "id": "1772499944457", "year": "FY26" },
            { "client": "SPR 防災", "amount": 20000000, "status": "COMMIT WITH RISK", "month": "4月", "id": "1772500902043", "year": "FY26" },
            { "client": "DK VEEAM", "amount": 30000000, "status": "COMMIT WITH RISK", "month": "7月", "id": "1772502586693", "year": "FY26" },
            { "client": "酪農学園　KGS", "amount": 10000000, "status": "COMMIT WITH RISK", "month": "3月", "id": "1772502692597", "year": "FY26" },
            { "client": "DK ほくとネット本番", "amount": 100000000, "status": "COMMIT WITH RISK", "month": "7月", "id": "1772502446678", "year": "FY26" },
            { "client": "IWZ VDI", "amount": 30000000, "status": "STRONG UPSIDE", "month": "4月", "id": "1772500995264", "year": "FY26" },
            { "client": "SPR BPR NTNX", "amount": 60000000, "status": "STRONG UPSIDE", "month": "4月", "id": "1772501883219", "year": "FY26" },
            { "client": "JSD G会社", "amount": 50000000, "status": "STRONG UPSIDE", "month": "4月", "id": "1772502230810", "year": "FY26" },
            { "client": "SEC　NTNX", "amount": 130000000, "status": "STRONG UPSIDE", "month": "5月", "id": "1772502294711", "year": "FY26" },
            { "client": "NOSAI", "amount": 40000000, "status": "STRONG UPSIDE", "month": "4月", "id": "1772502352133", "year": "FY26" },
            { "client": "HARP STEP1", "amount": 10000000, "status": "STRONG UPSIDE", "month": "4月", "id": "1772502382207", "year": "FY26" },
            { "client": "SMART道庁", "amount": 200000000, "status": "STRONG UPSIDE", "month": "6月", "id": "1772502531162", "year": "FY26" },
            { "client": "CTS PCBE", "amount": 20000000, "status": "STRONG UPSIDE", "month": "7月", "id": "1772502803827", "year": "FY26" },
            { "client": "SPR 水道", "amount": 50000000, "status": "STRONG UPSIDE", "month": "6月", "id": "1772502838461", "year": "FY26" },
            { "client": "名寄市立大学　FBJ", "amount": 50000000, "status": "PIPELINE", "month": "3月", "id": "1772500745545", "year": "FY26" },
            { "client": "SGU PCBE", "amount": 10000000, "status": "PIPELINE", "month": "5月", "id": "1772502649416", "year": "FY26" },
            { "client": "北大病院", "amount": 50000000, "status": "PIPELINE", "month": "6月", "id": "1772502903577", "year": "FY26" }
          ]);
          
          const [quotas, setQuotas] = useState({
            FY26: { "ALL": 600, "Q1": 200, "Q2": 200, "Q3": 200, "Q4": 200 },
            FY27: { "ALL": 600, "Q1": 200, "Q2": 200, "Q3": 200, "Q4": 200 }
          });

          const [selectedYear, setSelectedYear] = useState("FY26");
          const [quarter, setQuarter] = useState("ALL");
          const [activeTab, setActiveTab] = useState("matrix");
          const [hoverId, setHoverId] = useState(null);
          const [showForm, setShowForm] = useState(false);
          const [showQuotaForm, setShowQuotaForm] = useState(false);
          const [editId, setEditId] = useState(null);
          const [form, setForm] = useState({ client: "", amount: "", status: "PIPELINE", month: "3月", year: "FY26" });
          
          // 更新されたGAS URLを初期値に設定
          const [gasUrl, setGasUrl] = useState("https://script.google.com/macros/s/AKfycbxumke2NQvS0Wg2fQ2g1n1htNCi3WliqpxRcnXvUAgNgKOiFF69g0DSf87GlDtzkXqmlQ/exec");
          
          const [syncStatus, setSyncStatus] = useState({ loading: false, msg: "" });
          const fileRef = useRef(null);

          useEffect(() => {
            try {
              const raw = localStorage.getItem(STORAGE_KEY);
              if (raw) {
                const d = JSON.parse(raw);
                if (d.deals) setDeals(d.deals);
                if (d.quotas) {
                    if (d.quotas.FY26) setQuotas(d.quotas);
                    else setQuotas({ FY26: d.quotas, FY27: { "ALL": 600, "Q1": 200, "Q2": 200, "Q3": 200, "Q4": 200 } });
                }
                if (d.gasUrl) setGasUrl(d.gasUrl);
              }
            } catch (err) {}
          }, []);

          useEffect(() => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ deals, quotas, gasUrl }));
          }, [deals, quotas, gasUrl]);

          const currentQuotaValue = useMemo(() => {
            const yrQ = quotas[selectedYear] || quotas.FY26;
            if (quarter === "ALL") {
              return (Number(yrQ.Q1 || 0) + Number(yrQ.Q2 || 0) + Number(yrQ.Q3 || 0) + Number(yrQ.Q4 || 0));
            }
            return Number(yrQ[quarter] || 0);
          }, [quotas, quarter, selectedYear]);

          const gridCfg = useMemo(() => (
            quarter === "ALL" ? { cols: 40, rows: 40, total: 1600 } : { cols: 30, rows: 20, total: 600 }
          ), [quarter]);

          const filtered = useMemo(() => {
            const yearDeals = deals.filter(d => (d.year || "FY26") === selectedYear);
            return quarter === "ALL" ? yearDeals : yearDeals.filter(d => (Q_MAP[quarter] || []).includes(d.month));
          }, [deals, quarter, selectedYear]);

          const sortedDeals = useMemo(() => (
            [...filtered].sort((a, b) => STATUS_ORDER.indexOf(a.status) - STATUS_ORDER.indexOf(b.status) || (Number(b.amount || 0) - Number(a.amount || 0)))
          ), [filtered]);

          const gridData = useMemo(() => {
            const arr = Array(gridCfg.total).fill(null);
            let ptr = 0;
            sortedDeals.forEach((deal, si) => {
              const units = Math.max(1, Math.round(Number(deal.amount || 0) / UNIT_VALUE));
              for (let i = 0; i < units && ptr < gridCfg.total; i++, ptr++) {
                arr[ptr] = { ...deal, isStart: i === 0, units, sortIdx: si };
              }
            });
            return arr;
          }, [sortedDeals, gridCfg]);

          const stats = useMemo(() => {
            const qv = currentQuotaValue * UNIT_VALUE;
            const total = filtered.reduce((sum, d) => sum + Number(d.amount || 0), 0);
            
            let cum = 0;
            const byStatus = STATUS_ORDER.map(s => {
              const val = filtered.filter(d => d.status === s).reduce((sum, d) => sum + Number(d.amount || 0), 0);
              cum += val;
              return { 
                status: s, 
                val, 
                cumVal: cum, 
                cumPct: qv > 0 ? Math.round((cum / qv) * 100) : 0 
              };
            });

            return { 
                total, 
                achievement: qv > 0 ? Math.round((total / qv) * 100) : 0, 
                byStatus,
                qUnits: Math.round(currentQuotaValue) 
            };
          }, [filtered, currentQuotaValue]);

          const saveDeal = () => {
            const amt = Number(form.amount) * UNIT_VALUE;
            if (!form.client || isNaN(amt)) return;
            if (editId) setDeals(deals.map(d => d.id === editId ? { ...form, amount: amt, id: editId } : d));
            else setDeals([...deals, { ...form, amount: amt, id: Date.now().toString() }]);
            setEditId(null); setShowForm(false);
          };

          const handleImport = (e) => {
            const r = new FileReader();
            r.onload = ev => { 
                try {
                    const d = JSON.parse(ev.target.result); 
                    if (d.deals) setDeals(d.deals); 
                    if (d.quotas) setQuotas(d.quotas);
                } catch(e) {}
            };
            r.readAsText(e.target.files[0]);
          };

          const syncToCloud = async () => {
            if (!gasUrl) return setSyncStatus({ loading: false, msg: "URL REQUIRED" });
            setSyncStatus({ loading: true, msg: "REQUESTING..." });
            try {
              const payload = JSON.stringify({ deals, quotas, timestamp: new Date().toISOString(), clientSource: "MobileSquare-v11.14" });
              await fetch(gasUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: payload });
              setSyncStatus({ loading: false, msg: "SENT (CHECK SHEET)" });
            } catch (err) {
              setSyncStatus({ loading: false, msg: "SEND FAILED: " + err.message.substring(0,20) });
            }
            setTimeout(() => setSyncStatus({ loading: false, msg: "" }), 5000);
          };

          const loadFromCloud = async () => {
            if (!gasUrl) return setSyncStatus({ loading: false, msg: "URL REQUIRED" });
            setSyncStatus({ loading: true, msg: "FETCHING..." });
            try {
              const response = await fetch(gasUrl, { method: 'GET', cache: 'no-store' });
              if (!response.ok) throw new Error("HTTP " + response.status);
              const data = await response.json();
              if (data && data.deals) {
                setDeals(data.deals);
                if (data.quotas) setQuotas(data.quotas);
                setSyncStatus({ loading: false, msg: "LOAD SUCCESS (" + data.deals.length + ")" });
              } else {
                setSyncStatus({ loading: false, msg: "DATA EMPTY ON SHEET" });
              }
            } catch (err) {
              console.error(err);
              setSyncStatus({ loading: false, msg: "LOAD ERROR (CORS?)" });
            }
            setTimeout(() => setSyncStatus({ loading: false, msg: "" }), 5000);
          };

          const getQta = (month) => {
            for (const [q, months] of Object.entries(Q_MAP)) {
              if (months.includes(month)) return q;
            }
            return "-";
          };

          return (
            <div className="flex flex-col h-full overflow-hidden bg-black">
              <header className="bg-black border-b border-[#01A98240] pt-4 pb-2 px-4 flex-shrink-0 z-50 no-print">
                <div className="flex justify-between items-center mb-3">
                  <div className="flex items-center gap-2">
                    <div className="w-6 h-6 bg-[#01A982] flex items-center justify-center rounded-sm shadow-lg shadow-[#01A982]/20"><Ico.Grid /></div>
                    <span className="text-[10px] font-black tracking-[0.2em] text-white uppercase">PIPELINE MOBILE</span>
                  </div>
                  <div className="flex gap-3">
                    <button onClick={() => fileRef.current.click()} className="p-2 text-gray-400 border border-white/10 rounded-sm active:bg-white/10" title="Import JSON"><Ico.Up /></button>
                    <input ref={fileRef} type="file" accept=".json" className="hidden" onChange={handleImport} />
                    <button onClick={() => window.print()} className="px-3 py-1 bg-white/5 text-white text-[10px] font-bold border border-white/20 rounded-sm uppercase tracking-tighter active:bg-white/10">PDF</button>
                  </div>
                </div>

                <div className="flex flex-col gap-2 mb-3">
                    <div className="flex bg-[#0d1117] p-1 border border-white/10 rounded-sm overflow-x-auto scrollbar-hide">
                        {YEARS.map(y => (
                            <button key={y} onClick={() => setSelectedYear(y)} className={`flex-1 min-w-[80px] py-1.5 text-[11px] font-black transition-all rounded-sm ${selectedYear === y ? 'bg-[#01A982] text-white' : 'text-gray-500'}`}>{y}</button>
                        ))}
                    </div>
                    <div className="flex bg-[#0d1117] p-1 border border-white/10 rounded-sm overflow-x-auto scrollbar-hide">
                        {["ALL", "Q1", "Q2", "Q3", "Q4"].map(q => (
                            <button key={q} onClick={() => setQuarter(q)} className={`flex-1 min-w-[60px] py-1.5 text-[11px] font-black transition-all rounded-sm ${quarter === q ? 'bg-[#01A982] text-white' : 'text-gray-500'}`}>{q}</button>
                        ))}
                    </div>
                </div>

                <div className="flex justify-between items-center px-1 mb-3">
                  <div className="flex flex-col">
                    <span className="text-[8px] text-gray-600 font-bold uppercase tracking-widest">Pipeline ({selectedYear})</span>
                    <span className="text-lg font-black text-[#01A982]">{fmt(stats.total)}</span>
                  </div>
                  <button onClick={() => setShowQuotaForm(true)} className="flex flex-col items-center group active:scale-95 transition-transform">
                    <span className="text-[8px] text-gray-600 font-bold uppercase tracking-widest flex items-center gap-1">Quota <Ico.Target /></span>
                    <span className="text-lg font-black text-white group-hover:text-[#01A982] border-b border-transparent group-hover:border-[#01A982]">{fmt(currentQuotaValue*UNIT_VALUE)}</span>
                  </button>
                  <div className="flex flex-col items-end">
                    <span className="text-[8px] text-gray-600 font-bold uppercase tracking-widest">Achieved</span>
                    <span className="text-lg font-black text-white">{stats.achievement}%</span>
                  </div>
                </div>

                {/* 進捗数字バー: v11.14のレイアウトへ差し戻し、フォントのみ14px適用 */}
                <div className="h-6 bg-black border border-white/5 flex overflow-hidden rounded-sm relative shadow-inner mb-1">
                  {stats.byStatus.map(s => s.val > 0 && (
                    <div key={s.status} style={{ width: `${(s.val / UNIT_VALUE / stats.qUnits) * 100}%`, background: STATUS_META[s.status].bg }} className="h-full border-r border-white/10 flex items-center justify-end px-2 group overflow-hidden">
                      <span className="text-[14px] font-black text-white whitespace-nowrap opacity-90 drop-shadow-md">{s.cumPct}%</span>
                    </div>
                  ))}
                  <div className="absolute top-0 right-0 h-full w-[2px] bg-white shadow-[0_0_10px_white] z-10"></div>
                </div>
              </header>

              <main className="flex-1 min-h-0 relative flex flex-col no-print">
                {activeTab === 'matrix' ? (
                  <div className="flex-1 flex flex-col items-center justify-start overflow-hidden pt-4">
                    <div className="matrix-square-container bg-[#0d1117] border-y border-white/10 p-[1px] gap-[1px] grid shadow-2xl" style={{ gridTemplateColumns: `repeat(${gridCfg.cols}, 1fr)`, gridTemplateRows: `repeat(${gridCfg.rows}, 1fr)` }}>
                      {gridData.map((cell, i) => {
                        const isSelected = cell && hoverId === cell.id;
                        const isQuota = i < stats.qUnits;
                        return (
                          <div key={i} onClick={() => cell && setHoverId(hoverId === cell.id ? null : cell.id)} className={`relative transition-all ${cell ? 'cursor-pointer' : 'tile-empty'} ${isSelected ? 'balloon-active' : ''}`} style={{ backgroundColor: cell ? (isSelected ? "#FDE047" : STATUS_META[cell.status].bg) : (isQuota ? "#0f172a" : "#05070a"), border: cell ? `1px solid ${isSelected ? "#FDE047" : STATUS_META[cell.status].bg + '44'}` : '1px solid rgba(255,255,255,0.02)' }}></div>
                        );
                      })}
                    </div>

                    {hoverId && (
                      <div className="absolute top-1/2 left-0 w-full p-6 -translate-y-1/2 pointer-events-none z-[4000] animate-in zoom-in duration-200">
                        <div className="bg-black/50 backdrop-blur-md border-2 border-[#FDE047] p-8 shadow-[0_0_60px_rgba(253,224,71,0.5)] rounded-sm text-center relative pointer-events-auto">
                          <button onClick={(e) => { e.stopPropagation(); setHoverId(null); }} className="absolute top-3 right-3 p-2 text-gray-400 hover:text-white active:scale-90 transition-all">
                             <Ico.X />
                          </button>
                          {(() => {
                            const d = deals.find(x => x.id === hoverId);
                            if (!d) return null;
                            return (
                              <>
                                <div className="text-[10px] font-black text-[#FDE047] uppercase tracking-[0.5em] mb-2 drop-shadow-md">Target Identified</div>
                                <div className="text-2xl font-black text-white uppercase mb-3 truncate px-6 drop-shadow-md">{d.client}</div>
                                <div className="text-4xl font-black text-[#FDE047] mb-2 drop-shadow-lg">{fmt(d.amount)}</div>
                                <div className="text-[11px] font-bold text-gray-300 uppercase tracking-widest bg-white/10 py-1 px-4 inline-block rounded-full mb-6">
                                  {d.year || "FY26"} · {STATUS_META[d.status].label} · {d.month}
                                </div>
                                <div className="mt-2">
                                    <button onClick={() => { setForm({ client: d.client, amount: String(Number(d.amount||0)/UNIT_VALUE), status: d.status, month: d.month, year: d.year || "FY26" }); setEditId(d.id); setShowForm(true); }} className="px-8 py-3 bg-[#01A982] text-white text-[11px] font-black uppercase tracking-[0.3em] shadow-lg shadow-[#01A982]/40 active:scale-95 transition-all">Adjust Strategy</button>
                                </div>
                              </>
                            );
                          })()}
                        </div>
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="flex-1 overflow-y-auto bg-[#030508] p-4 pb-20 space-y-5 scrollbar-hide">
                    {STATUS_ORDER.map(s => {
                      const grp = filtered.filter(d => d.status === s).sort((a, b) => Number(b.amount || 0) - Number(a.amount || 0));
                      if (!grp.length) return null;
                      return (
                        <div key={s} className="space-y-2">
                          <div className="text-[10px] font-black text-gray-600 uppercase tracking-[0.2em] border-l-2 border-gray-800 pl-3">{STATUS_META[s].label}</div>
                          {grp.map(deal => (
                            <div key={deal.id} onClick={() => { setForm({ client: deal.client, amount: String(Number(deal.amount || 0) / UNIT_VALUE), status: deal.status, month: deal.month, year: deal.year || "FY26" }); setEditId(deal.id); setShowForm(true); }} className="p-4 bg-white/[0.03] border border-white/5 flex items-center justify-between rounded-sm active:bg-white/10">
                              <div className="flex flex-col gap-1">
                                <span className="text-[14px] font-black text-white uppercase truncate w-40 tracking-tighter">{deal.client}</span>
                                <span className="text-[9px] text-gray-600 font-bold uppercase">{deal.year || "FY26"} · {deal.month}</span>
                              </div>
                              <span className="text-[15px] text-[#01A982] font-black">{fmt(deal.amount)}</span>
                            </div>
                          ))}
                        </div>
                      );
                    })}
                  </div>
                )}
              </main>

              <nav className="no-print bg-black border-t border-white/10 flex items-center justify-around h-20 px-6 pb-2 z-40">
                <button onClick={() => { setActiveTab('matrix'); setHoverId(null); }} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'matrix' ? 'text-[#01A982] scale-110' : 'text-gray-600'}`}><Ico.Grid /><span className="text-[9px] font-black uppercase tracking-widest">Matrix</span></button>
                <button onClick={() => { setEditId(null); setForm({ client: "", amount: "", status: "PIPELINE", month: "3月", year: selectedYear }); setShowForm(true); }} className="w-14 h-14 bg-[#01A982] text-white flex items-center justify-center rounded-full shadow-[0_0_30px_rgba(1,169,130,0.4)] active:scale-90 -translate-y-6 border-4 border-black"><Ico.Plus /></button>
                <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'list' ? 'text-[#01A982] scale-110' : 'text-gray-600'}`}><Ico.List /><span className="text-[9px] font-black uppercase tracking-widest">List</span></button>
              </nav>

              {/* Modal: Settings & Quota Screen */}
              {showQuotaForm && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-xl z-[5000] flex flex-col no-print animate-in fade-in duration-300">
                  <header className="px-6 py-6 border-b border-white/10 flex justify-between items-center bg-black/40">
                    <span className="text-[10px] font-black tracking-[0.5em] text-[#01A982] uppercase flex items-center gap-2"><Ico.Target /> Settings & Quota</span>
                    <button onClick={() => setShowQuotaForm(false)} className="text-gray-500 p-2 active:text-white active:scale-90"><Ico.X /></button>
                  </header>
                  <div className="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide">
                    <div className="bg-white/[0.05] border border-white/5 p-4 rounded-sm space-y-3 shadow-2xl backdrop-blur-md text-center">
                        <span className="text-[12px] font-black text-white uppercase tracking-[0.2em]">Editing: {selectedYear} Targets</span>
                    </div>
                    <div className="bg-white/[0.05] border border-white/5 p-4 rounded-sm space-y-3 shadow-2xl backdrop-blur-md">
                      <label className="text-[8px] font-black text-[#01A982] uppercase tracking-[0.2em] flex items-center gap-2"><Ico.Cloud /> Cloud Sync (GAS)</label>
                      <input type="text" value={gasUrl} onChange={e => setGasUrl(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec" className="w-full bg-black border border-white/10 p-3 text-[10px] font-mono text-white outline-none focus:border-[#01A982]" />
                      <div className="grid grid-cols-2 gap-3">
                        <button onClick={loadFromCloud} disabled={syncStatus.loading} className="py-3 bg-white/5 text-white text-[10px] font-black border border-white/20 active:bg-white/10 transition-all disabled:opacity-50 uppercase tracking-tighter">Load From Cloud</button>
                        <button onClick={syncToCloud} disabled={syncStatus.loading} className="py-3 bg-[#01A982]/20 text-[#01A982] text-[10px] font-black border border-[#01A982]/30 active:bg-[#01A982]/30 transition-all disabled:opacity-50 uppercase tracking-tighter">Save To Cloud</button>
                      </div>
                      {syncStatus.msg && <div className="text-[10px] font-black text-center text-sky-400 uppercase tracking-[0.3em] bg-sky-900/20 py-2 rounded-sm border border-sky-500/30 animate-pulse">{syncStatus.msg}</div>}
                    </div>
                    <div className="bg-white/[0.05] border border-white/5 p-4 rounded-sm space-y-3 shadow-2xl backdrop-blur-md">
                        <label className="text-[8px] font-black text-gray-500 uppercase tracking-[0.2em]">{selectedYear} Full Year Target</label>
                        <div className="flex items-center gap-4">
                            <div className="flex-1 bg-black/40 border border-white/5 p-4 text-2xl font-black text-[#01A982] shadow-inner">
                                {(Number(quotas[selectedYear].Q1||0) + Number(quotas[selectedYear].Q2||0) + Number(quotas[selectedYear].Q3||0) + Number(quotas[selectedYear].Q4||0)).toLocaleString()}
                            </div>
                            <span className="text-lg font-black text-gray-600">M</span>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                        {["Q1", "Q2", "Q3", "Q4"].map(q => (
                          <div key={q} className="bg-white/[0.05] border border-white/5 p-3 rounded-sm space-y-1 shadow-2xl backdrop-blur-md">
                            <label className="text-[8px] font-black text-gray-500 uppercase tracking-widest">{q} Target</label>
                            <div className="flex items-center gap-2">
                              <input type="number" value={quotas[selectedYear][q]} onChange={e => {
                                  const newQ = {...quotas};
                                  newQ[selectedYear][q] = Number(e.target.value);
                                  setQuotas(newQ);
                              }} className="w-full bg-black border border-white/10 p-2 text-lg font-black text-white outline-none focus:border-[#01A982]" />
                              <span className="text-xs font-bold text-gray-700">M</span>
                            </div>
                          </div>
                        ))}
                    </div>
                    <div className="pt-2">
                        <button onClick={() => setShowQuotaForm(false)} className="w-full py-4 bg-[#01A982] text-white font-black text-lg uppercase tracking-[0.3em] shadow-xl active:scale-95 transition-transform mb-4">DEPLOY TARGETS</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Modal: Opportunity Config */}
              {showForm && (
                <div className="fixed inset-0 bg-black z-[5000] flex flex-col no-print animate-in slide-in-from-bottom duration-300">
                  <header className="px-6 py-6 border-b border-white/10 flex justify-between items-center">
                    <span className="text-[10px] font-black tracking-[0.5em] text-[#01A982] uppercase">Opportunity Config</span>
                    <button onClick={() => setShowForm(false)} className="text-gray-500 p-2 active:text-white"><Ico.X /></button>
                  </header>
                  <div className="flex-1 overflow-y-auto p-8 space-y-6">
                    <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-2">
                          <label className="text-[8px] font-black text-gray-600 uppercase tracking-widest">Fiscal Year</label>
                          <select value={form.year} onChange={e => setForm({ ...form, year: e.target.value })} className="w-full bg-[#0d1117] border border-white/10 p-4 text-sm font-black text-white outline-none appearance-none rounded-none">
                            {YEARS.map(y => <option key={y} value={y} className="bg-black">{y}</option>)}
                          </select>
                        </div>
                        <div className="space-y-2">
                          <label className="text-[8px] font-black text-gray-600 uppercase tracking-widest">Month</label>
                          <select value={form.month} onChange={e => setForm({ ...form, month: e.target.value })} className="w-full bg-[#0d1117] border border-white/10 p-4 text-sm font-black text-white outline-none appearance-none rounded-none">
                            {MONTHS.map(m => <option key={m} value={m} className="bg-black">{m}</option>)}
                          </select>
                        </div>
                    </div>
                    <div className="space-y-2">
                      <label className="text-[8px] font-black text-gray-600 uppercase tracking-widest">Client Identity</label>
                      <input value={form.client} onChange={e => setForm({ ...form, client: e.target.value })} className="w-full bg-[#0d1117] border border-white/10 p-5 text-lg font-black text-white outline-none focus:border-[#01A982] rounded-none shadow-inner" />
                    </div>
                    <div className="space-y-2">
                      <label className="text-[8px] font-black text-gray-600 uppercase tracking-widest">Amount (¥M)</label>
                      <input type="number" value={form.amount} onChange={e => setForm({ ...form, amount: e.target.value })} className="w-full bg-[#0d1117] border border-white/10 p-5 text-lg font-black text-white outline-none focus:border-[#01A982] rounded-none shadow-inner" />
                    </div>
                    <div className="space-y-2">
                        <label className="text-[8px] font-black text-gray-600 uppercase tracking-widest">Confidence Level</label>
                        <select value={form.status} onChange={e => setForm({ ...form, status: e.target.value })} className="w-full bg-[#0d1117] border border-white/10 p-5 text-lg font-black text-white outline-none appearance-none rounded-none">
                          {STATUS_ORDER.map(s => <option key={s} value={s} className="bg-black">{s}</option>)}
                        </select>
                    </div>
                    <div className="pt-6 flex flex-col gap-4">
                        <button onClick={saveDeal} className="w-full py-5 bg-[#01A982] text-white font-black text-lg uppercase tracking_widest shadow-xl active:scale-95 transition-transform">DEPLOY POSITION</button>
                        {editId && (
                            <button onClick={() => { setDeals(deals.filter(d => d.id !== editId)); setShowForm(false); }} 
                              className="w-full py-4 text-rose-500 font-bold uppercase text-sm tracking-widest">Remove Opportunity</button>
                        )}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
