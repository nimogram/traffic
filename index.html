<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EQ-Logic Pro | Strategic Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #05070a;
            color: #e2e8f0;
            overflow: hidden;
            touch-action: manipulation;
        }

        .emerald-glow {
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
        }

        .slide-in {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .translate-x-full {
            transform: translateX(100%);
        }

        .bg-glass {
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }

        .active-tap:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        .hint-fade {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .target-btn-active {
            background-color: rgba(16, 185, 129, 0.3) !important;
            border-color: #10b981 !important;
            color: #fff !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }

        .exp-text {
            font-size: 1.1rem;
            font-weight: 800;
        }

        .heart-display {
            font-size: 1.2rem;
            letter-spacing: 0.1em;
            line-height: 1;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        .chart-bar {
            transition: height 1s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="app" class="max-w-lg mx-auto w-full h-screen flex flex-col p-3 gap-2 relative">
        
        <!-- HEADER (Horizontal Layout) -->
        <header class="bg-slate-900/40 border border-slate-800 rounded-xl p-3 relative overflow-hidden emerald-glow shrink-0">
            <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)]"></div>
            
            <div class="flex items-center justify-between gap-4">
                <!-- Points Section -->
                <div class="flex flex-col">
                    <div class="text-[8px] font-black text-emerald-500 tracking-[0.2em] mb-0.5 uppercase">EQ ASSET</div>
                    <div class="flex items-baseline gap-1.5">
                        <span id="total-points" class="text-3xl font-black text-white leading-none tracking-tighter tabular-nums">0</span>
                        <span class="exp-text text-slate-500 uppercase tracking-tighter scale-90 origin-left tracking-tighter">Total EXP</span>
                    </div>
                </div>

                <!-- Sync Section (Hearts) -->
                <div class="flex-1 max-w-[120px] text-center">
                    <div class="flex flex-col items-center">
                        <div class="flex items-center gap-1 text-emerald-500 mb-0.5">
                            <i data-lucide="heart" class="w-2.5 h-2.5 fill-emerald-500"></i>
                            <span class="text-[8px] font-black uppercase tracking-widest">Sync</span>
                        </div>
                        <div id="heart-container" class="heart-display text-emerald-500 font-bold">
                            ♡♡♡♡♡
                        </div>
                    </div>
                </div>

                <!-- Toggle Stats & Mute -->
                <div class="flex flex-col items-end gap-1.5">
                    <div class="flex gap-2">
                        <button id="toggle-view-btn" onclick="toggleView()" class="p-1.5 rounded-full bg-slate-800/50 text-slate-500 hover:text-emerald-400">
                            <i id="view-icon" data-lucide="bar-chart-3" class="w-3.5 h-3.5"></i>
                        </button>
                        <button onclick="toggleMute()" id="mute-btn" class="p-1.5 rounded-full bg-slate-800/50 text-slate-500">
                            <i data-lucide="volume-2" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                    <div id="rank-badge" class="text-[8px] font-bold text-emerald-400 px-1.5 py-0.5 bg-emerald-500/10 rounded border border-emerald-500/20 uppercase tracking-tighter">
                        孤高の建築家
                    </div>
                </div>
            </div>
        </header>

        <!-- MAIN VIEW (ACTION GRID) -->
        <div id="action-view" class="flex-1 grid grid-cols-2 gap-2 overflow-y-auto pr-0.5">
            <!-- Buttons injected by JS -->
        </div>

        <!-- STATS VIEW (HIDDEN BY DEFAULT) -->
        <div id="stats-view" class="hidden flex-1 flex flex-col gap-3 overflow-y-auto pr-0.5">
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl flex flex-col items-center text-center">
                    <span class="text-[8px] font-black text-slate-500 uppercase mb-1">Weekly Total</span>
                    <span id="weekly-total" class="text-xl font-black text-emerald-400">0</span>
                    <span class="text-[8px] text-slate-600 uppercase">EXP / 7 Days</span>
                </div>
                <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl flex flex-col items-center text-center">
                    <span class="text-[8px] font-black text-slate-500 uppercase mb-1">Daily Average</span>
                    <span id="daily-average" class="text-xl font-black text-blue-400">0.0</span>
                    <span class="text-[8px] text-slate-600 uppercase">EXP / Day</span>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl flex flex-col gap-4 shrink-0">
                <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Performance Trend</span>
                <div id="chart-container" class="h-28 flex items-end justify-between gap-1 px-2 border-b border-slate-800 pb-2 relative"></div>
                <div class="flex justify-between px-2 text-[7px] font-bold text-slate-600 uppercase">
                    <span>-6D</span><span>-5D</span><span>-4D</span><span>-3D</span><span>-2D</span><span>-1D</span><span>Today</span>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl flex flex-col gap-2 min-h-[120px]">
                <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Recent Activity Log</span>
                <div id="history-list" class="space-y-1"></div>
            </div>
        </div>

        <!-- HINT AREA -->
        <div id="hint-box" class="bg-emerald-500/5 border border-emerald-500/20 p-3 rounded-xl flex items-start gap-2 relative overflow-hidden min-h-[80px] shrink-0">
            <div class="text-emerald-400 shrink-0 mt-0.5 animate-pulse">
                <i data-lucide="zap" class="w-3.5 h-3.5"></i>
            </div>
            <div class="flex-1">
                <p class="text-[8px] font-black text-emerald-500/60 uppercase tracking-widest mb-0.5">Architect's Strategy Hint</p>
                <div id="hint-text-container">
                    <p id="hint-text" class="text-sm font-medium leading-tight text-slate-300 italic hint-fade">
                        背景・理由を30秒付ける（依頼・意見の前に「なぜか」を伝える）
                    </p>
                </div>
            </div>
        </div>

        <!-- FOOTER ADVICE -->
        <footer id="footer-status" class="bg-emerald-600 p-2.5 rounded-xl flex items-center gap-2 border border-white/10 transition-colors duration-500 shrink-0">
            <div class="w-7 h-7 rounded-lg bg-white/10 flex items-center justify-center text-white shrink-0 shadow-inner backdrop-blur-sm">
                <i data-lucide="smile" class="w-4 h-4"></i>
            </div>
            <div class="flex-1 min-w-0">
                <p id="advisor-text" class="text-[10px] font-bold text-white leading-tight">
                    Advisor Engine Online.
                </p>
            </div>
            <div id="success-icon" class="hidden">
                <i data-lucide="check-circle-2" class="w-4 h-4 text-white animate-bounce"></i>
            </div>
        </footer>
    </div>

    <!-- REGISTRATION SLIDE-IN PANEL -->
    <div id="detail-panel" class="fixed inset-0 z-50 flex justify-end pointer-events-none overflow-hidden">
        <div id="panel-backdrop" class="absolute inset-0 bg-black/40 opacity-0 transition-opacity pointer-events-none backdrop-blur-sm"></div>
        <div id="panel-content" class="w-[85%] max-w-sm h-full bg-glass border-l border-emerald-500/30 p-6 slide-in translate-x-full pointer-events-auto flex flex-col gap-6 shadow-[-10px_0_30px_rgba(0,0,0,0.5)]">
            <div class="flex justify-between items-center border-b border-emerald-500/20 pb-4">
                <div>
                    <h2 id="panel-title" class="text-xl font-black text-white tracking-tight">ログ登録</h2>
                    <p id="panel-points" class="text-emerald-400 font-mono font-bold mt-1 tracking-widest"><span class="exp-text">+10 EXP</span> DETECTED</p>
                </div>
                <button onclick="closePanel()" class="p-2 bg-white/10 rounded-full text-slate-200 active-tap">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-emerald-500 tracking-[0.2em] block mb-3 uppercase">Target Person</label>
                    <div id="target-selector" class="grid grid-cols-2 gap-2">
                        <button onclick="selectTarget('AKS')" class="target-opt bg-black/40 border border-slate-700 rounded-xl py-3 text-xs font-bold text-slate-400 transition-all active-tap">AKS</button>
                        <button onclick="selectTarget('YSD')" class="target-opt bg-black/40 border border-slate-700 rounded-xl py-3 text-xs font-bold text-slate-400 transition-all active-tap">YSD</button>
                        <button onclick="selectTarget('YKO')" class="target-opt bg-black/40 border border-slate-700 rounded-xl py-3 text-xs font-bold text-slate-400 transition-all active-tap">YKO</button>
                        <button onclick="selectTarget('OTHER')" class="target-opt bg-black/40 border border-slate-700 rounded-xl py-3 text-xs font-bold text-slate-400 transition-all active-tap">OTHER</button>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-emerald-500 tracking-[0.2em] block mb-2 uppercase">Strategic Memo</label>
                    <textarea id="log-memo" rows="6" placeholder="状況、反応、改善ロジックを記録..." class="w-full bg-black/40 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-emerald-500 transition-colors placeholder:text-slate-700"></textarea>
                </div>
            </div>

            <div class="mt-auto pb-4">
                <button onclick="saveLog()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-900/40 transition-all active:scale-95 uppercase tracking-widest text-sm">
                    Confirm Execution
                </button>
            </div>
        </div>
    </div>

    <script>
        // CONFIG
        const LEVELS = [
            { min: 0, name: "孤高の建築家", color: "text-slate-400" },
            { min: 501, name: "戦略的ディレクター", color: "text-emerald-400" },
            { min: 2001, name: "全知全能の参謀", color: "text-yellow-500" }
        ];

        const ACTIONS = [
            { id: 'pillow', label: '枕詞', points: 10, icon: 'message-square', color: 'bg-emerald-600' },
            { id: 'vision', label: '顧客視点', points: 20, icon: 'target', color: 'bg-teal-600' },
            { id: 'buffer', label: '3秒待機', points: 50, icon: 'cpu', color: 'bg-emerald-700' },
            { id: 'network', label: '雑談', points: 40, icon: 'users', color: 'bg-slate-700' },
            { id: 'thanks_daily', label: 'ありがとう', points: 5, icon: 'heart', color: 'bg-emerald-500' },
            { id: 'thanks_spec', label: '具体称賛', points: 15, icon: 'smile', color: 'bg-emerald-400 text-emerald-950' },
            { id: 'thanks_pub', label: '公開称賛', points: 30, icon: 'trophy', color: 'bg-amber-500 text-amber-950' },
            { id: 'reset', label: '履歴消去', points: 0, icon: 'history', color: 'bg-slate-800' }
        ];

        const TIPS = [
            "🎯 基本原則：背景・理由を30秒付ける（依頼・意見の前に「なぜか」を伝える）",
            "🎯 基本原則：相手の考えの根拠を聞く（反論する前に理解する）",
            "🎯 基本原則：相手が大事にしていることを知り、そこを起点に交渉する",
            "🎯 基本原則：小さな約束は必ず守り、信頼のレバレッジを効かせる",
            "🎯 基本原則：相手の成功・貢献を見つけて伝え、リソースの質を上げる",
            "💬 交流：一方通行ではなく対話に。双方向のプロトコルを確立する",
            "💬 交流：『報告』ではなく『相談』に変え、共犯関係を構築する",
            "💬 交流：ミスを責めず、次に焦点を当てる（デバッグ思考）",
            "💬 交流：感謝は二度言う。言ったつもりは未送信と同じです",
            "💬 交流：メールの前に口頭。重要なパケットは非公式ルートで",
            "🤝 尊重：相手の視点を優先する場面を意識的に作り、Creditを溜める",
            "🤝 尊重：相手の判断を信頼し、マイクロマネジメントというノイズを排除",
            "🤝 尊重：相手の勉強・成長の機会をサポートし、将来の能力に投資する",
            "🤝 尊重：相手の家族・趣味・目標を知り、優先度設定を解読する",
            "⏱ 行動：妻には『家族イベント』を最優先で。家庭のパッチ当ては重要タスク",
            "⏱ 行動：同僚とは月1回、進捗や悩みを棚卸し。定期メンテでバグ予防",
            "⏱ 行動：定期的な食事・雑談は、非公式な情報経路を太くするインフラ投資"
        ];

        let state = {
            totalPoints: 0,
            dailyThanks: 0,
            isMuted: false,
            currentAction: null,
            selectedTarget: null,
            view: 'action', 
            logs: []
        };

        let audioCtx = null;
        let hintInterval = null;

        function loadData() {
            const savedData = localStorage.getItem('eq_logic_v3');
            if (savedData) {
                const parsed = JSON.parse(savedData);
                state.totalPoints = parsed.totalPoints || 0;
                state.logs = parsed.logs || [];
                refreshDailyThanks();
            }
        }

        function refreshDailyThanks() {
            const today = new Date().toLocaleDateString();
            state.dailyThanks = state.logs.filter(log => {
                return new Date(log.timestamp).toLocaleDateString() === today && log.id.startsWith('thanks');
            }).length;
        }

        function saveData() {
            localStorage.setItem('eq_logic_v3', JSON.stringify({
                totalPoints: state.totalPoints,
                logs: state.logs
            }));
        }

        function init() {
            loadData();
            lucide.createIcons();
            renderButtons();
            updateUI();
            startHintRotation();
        }

        function renderButtons() {
            const grid = document.getElementById('action-view'); 
            if (!grid) return; 
            grid.innerHTML = '';
            ACTIONS.forEach(action => {
                const btn = document.createElement('button');
                btn.className = `${action.color} relative flex flex-col items-center justify-center p-2 rounded-xl active-tap transition-all shadow-lg`;
                btn.onclick = () => handleAction(action);
                btn.innerHTML = `
                    <div class="mb-0.5"><i data-lucide="${action.icon}" class="w-4 h-4"></i></div>
                    <span class="text-[10px] font-black uppercase tracking-tight">${action.label}</span>
                    <span class="exp-text opacity-60 mt-0.5 scale-90 tracking-tighter">+${action.points} EXP</span>
                `;
                grid.appendChild(btn);
            });
            lucide.createIcons();
        }

        function startHintRotation() {
            if (hintInterval) clearInterval(hintInterval);
            hintInterval = setInterval(refreshHint, 10000);
            refreshHint();
        }

        function refreshHint() {
            const hintText = document.getElementById('hint-text');
            if (!hintText) return;
            hintText.classList.remove('hint-fade');
            void hintText.offsetWidth; 
            hintText.innerText = TIPS[Math.floor(Math.random() * TIPS.length)];
            hintText.classList.add('hint-fade');
        }

        function playSound(type) {
            if (state.isMuted) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.exponentialRampToValueAtTime(440, now + 0.1);
                gain.gain.setValueAtTime(0.04, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'success') {
                osc.type = 'triangle';
                [523, 659, 783, 1046].forEach((f, i) => {
                    osc.frequency.setValueAtTime(f, now + (i * 0.08));
                });
                gain.gain.setValueAtTime(0.04, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
        }

        function handleAction(action) {
            if (action.id === 'reset') {
                if(confirm("全データを消去しますか？")) {
                    state.totalPoints = 0;
                    state.logs = [];
                    state.dailyThanks = 0;
                    saveData();
                    updateUI();
                    playSound('click');
                }
                return;
            }
            playSound('click');
            state.currentAction = action;
            openPanel(action);
        }

        function openPanel(action) {
            const panel = document.getElementById('detail-panel');
            const content = document.getElementById('panel-content');
            const backdrop = document.getElementById('panel-backdrop');
            document.getElementById('panel-title').innerText = `${action.label}の戦略記録`;
            document.getElementById('panel-points').innerHTML = `<span class="exp-text">+${action.points} EXP</span> - ANALYSIS ON`;
            document.getElementById('log-memo').value = '';
            state.selectedTarget = null;
            document.querySelectorAll('.target-opt').forEach(btn => btn.classList.remove('target-btn-active'));
            panel.classList.remove('pointer-events-none');
            content.classList.remove('translate-x-full');
            backdrop.style.opacity = '1';
            backdrop.classList.add('pointer-events-auto');
        }

        function selectTarget(target) {
            state.selectedTarget = target;
            document.querySelectorAll('.target-opt').forEach(btn => {
                btn.classList.toggle('target-btn-active', btn.innerText === target);
            });
            playSound('click');
        }

        function closePanel() {
            const content = document.getElementById('panel-content');
            const backdrop = document.getElementById('panel-backdrop');
            content.classList.add('translate-x-full');
            backdrop.style.opacity = '0';
            backdrop.classList.remove('pointer-events-auto');
            setTimeout(() => document.getElementById('detail-panel').classList.add('pointer-events-none'), 400);
        }

        function saveLog() {
            const action = state.currentAction;
            const logEntry = {
                id: action.id,
                label: action.label,
                points: action.points,
                target: state.selectedTarget || 'OTHER',
                memo: document.getElementById('log-memo').value,
                timestamp: new Date().toISOString()
            };

            state.logs.push(logEntry);
            state.totalPoints += action.points;
            refreshDailyThanks();
            if (action.id.startsWith('thanks') && state.dailyThanks === 5) playSound('success');

            saveData();
            updateUI();
            closePanel();
            refreshHint();
        }

        function toggleView() {
            state.view = state.view === 'action' ? 'stats' : 'action';
            const actionView = document.getElementById('action-view');
            const statsView = document.getElementById('stats-view');
            const icon = document.getElementById('view-icon');

            if (state.view === 'stats') {
                actionView.classList.add('hidden');
                statsView.classList.remove('hidden');
                icon.setAttribute('data-lucide', 'layout-grid');
                renderStats();
            } else {
                actionView.classList.remove('hidden');
                statsView.classList.add('hidden');
                icon.setAttribute('data-lucide', 'bar-chart-3');
                renderButtons();
            }
            lucide.createIcons();
            playSound('click');
        }

        function renderStats() {
            const today = new Date();
            const sevenDaysAgo = new Date(today);
            sevenDaysAgo.setDate(today.getDate() - 6);
            sevenDaysAgo.setHours(0, 0, 0, 0);

            const weeklyLogs = state.logs.filter(log => new Date(log.timestamp) >= sevenDaysAgo);
            const weeklyTotal = weeklyLogs.reduce((sum, log) => sum + log.points, 0);
            const dailyAvg = (weeklyTotal / 7).toFixed(1);

            document.getElementById('weekly-total').innerText = weeklyTotal.toLocaleString();
            document.getElementById('daily-average').innerText = dailyAvg;

            const chartContainer = document.getElementById('chart-container');
            if (!chartContainer) return;
            chartContainer.innerHTML = '';
            
            const dailyScores = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(sevenDaysAgo);
                date.setDate(sevenDaysAgo.getDate() + i);
                const dateStr = date.toLocaleDateString();
                const dayScore = state.logs
                    .filter(log => new Date(log.timestamp).toLocaleDateString() === dateStr)
                    .reduce((sum, log) => sum + log.points, 0);
                dailyScores.push(dayScore);
            }

            const maxScore = Math.max(...dailyScores, 100); 
            dailyScores.forEach((score, index) => {
                const height = (score / maxScore) * 100;
                const bar = document.createElement('div');
                bar.className = 'chart-bar w-full bg-emerald-500 rounded-t-sm flex flex-col items-center justify-end group relative';
                bar.style.height = `${Math.max(height, 5)}%`;
                bar.innerHTML = `<div class="absolute bottom-full mb-1 opacity-0 group-hover:opacity-100 transition-opacity bg-slate-800 text-[8px] font-bold px-1 rounded border border-slate-700 pointer-events-none">${score}</div>`;
                chartContainer.appendChild(bar);
            });

            const historyList = document.getElementById('history-list');
            if (!historyList) return;
            historyList.innerHTML = '';
            const recentLogs = [...state.logs].reverse().slice(0, 10);
            recentLogs.forEach(log => {
                const date = new Date(log.timestamp);
                const item = document.createElement('div');
                item.className = 'flex justify-between items-center text-[10px] bg-slate-800/40 p-2 rounded border border-white/5';
                item.innerHTML = `<div class="flex flex-col"><span class="text-slate-500 text-[8px]">${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}</span><span class="font-bold text-slate-200">${log.label} <span class="text-emerald-500 text-[8px] tracking-widest ml-1">@${log.target}</span></span></div><span class="font-black text-emerald-400">+${log.points}</span>`;
                historyList.appendChild(item);
            });
        }

        function toggleMute() {
            state.isMuted = !state.isMuted;
            document.getElementById('mute-btn').innerHTML = `<i data-lucide="${state.isMuted ? 'volume-x' : 'volume-2'}" class="w-4 h-4"></i>`;
            lucide.createIcons();
        }

        function updateUI() {
            const pointsEl = document.getElementById('total-points');
            if (pointsEl) pointsEl.innerText = state.totalPoints.toLocaleString();
            const heartContainer = document.getElementById('heart-container');
            if (heartContainer) {
                const filledCount = Math.min(5, state.dailyThanks);
                heartContainer.innerText = '♥'.repeat(filledCount) + '♡'.repeat(5 - filledCount);
            }
            const rank = [...LEVELS].reverse().find(l => state.totalPoints >= l.min) || LEVELS[0];
            const badge = document.getElementById('rank-badge');
            if (badge) {
                badge.innerText = rank.name;
                badge.className = `text-[8px] font-bold ${rank.color} px-1.5 py-0.5 bg-slate-800 rounded border border-slate-700 uppercase tracking-tighter`;
            }
            const advisor = document.getElementById('advisor-text');
            const successIcon = document.getElementById('success-icon');
            if (advisor && successIcon) {
                if (state.dailyThanks >= 5) {
                    advisor.innerText = "同期完了。非常に合理的な判断です。休息を確保してください。";
                    successIcon.classList.remove('hidden');
                } else {
                    advisor.innerText = `ニモさん、あと${5 - state.dailyThanks}回の感謝パケットが必要です。バフを維持して。`;
                    successIcon.classList.add('hidden');
                }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
