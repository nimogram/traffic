<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EQ-Logic Pro | Octalysis Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        :root {
            --base-black: #0a0a0a;
            --accent-lime: #84cc16;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--base-black);
            color: #f8fafc;
            overflow: hidden;
            touch-action: manipulation;
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .theme-glow {
            box-shadow: 0 0 30px rgba(132, 204, 22, 0.1);
        }

        .active-tap:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        .typewriter::after {
            content: '|';
            animation: blink 1s step-end infinite;
            color: var(--accent-lime);
        }

        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }

        .log-item-container {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .log-item-content {
            position: relative;
            z-index: 2;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .delete-btn-bg {
            position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
            background-color: #ef4444; color: white;
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 15px; z-index: 1; border-radius: 12px;
            font-weight: 900; font-size: 10px;
        }

        /* 30-min Step Datetime Style */
        .datetime-input {
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: none;
            padding: 0;
            margin: 0;
            font-size: 13px;
            font-weight: 700;
            outline: none;
            cursor: pointer;
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.3;
        }

        .chart-wrapper {
            width: 100%;
            max-width: 320px;
            height: 280px;
            margin: 0 auto;
            position: relative;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">

    <div id="app" class="max-w-lg mx-auto w-full h-[calc(100dvh-2rem)] flex flex-col gap-4 relative">
        
        <!-- HEADER (Action View) -->
        <header id="global-header" class="liquid-glass rounded-[2rem] p-5 theme-glow shrink-0">
            <div class="flex justify-between items-start mb-4">
                <div onclick="toggleMasterView()" class="cursor-pointer">
                    <p class="text-[10px] font-black text-lime-500 tracking-[0.3em] mb-1 uppercase">EQ ASSET LOGIC</p>
                    <div class="flex items-baseline gap-2">
                        <!-- v12.5: Resized to 3xl (30px) as requested -->
                        <span id="header-total-points" class="text-3xl font-black text-white tracking-tighter tabular-nums">0</span>
                        <span class="text-[11px] font-black text-slate-500 uppercase tracking-widest">EXP Asset</span>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-3">
                    <div id="heart-container" class="flex gap-1">
                        <i data-lucide="heart" class="w-4 h-4 text-lime-500 fill-lime-500"></i>
                        <i data-lucide="heart" class="w-4 h-4 text-lime-500 fill-lime-500"></i>
                        <i data-lucide="heart" class="w-4 h-4 text-lime-500 fill-lime-500"></i>
                        <i data-lucide="heart" class="w-4 h-4 text-lime-500 fill-lime-500"></i>
                        <i data-lucide="heart" class="w-4 h-4 text-lime-500 fill-lime-500"></i>
                    </div>
                    <button onclick="toggleMute()" class="p-2.5 rounded-2xl bg-white/5 border border-white/10 active-tap">
                        <i id="mute-icon" data-lucide="volume-2" class="w-4 h-4 text-slate-400"></i>
                    </button>
                </div>
            </div>

            <div class="bg-black/40 rounded-2xl p-4 border border-white/5">
                <div class="flex justify-between items-end mb-2">
                    <div>
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest leading-none mb-1">Strategy Stage</p>
                        <p id="level-badge" class="text-xs font-black text-lime-400 uppercase tracking-widest leading-none">Lv.1 Specialist</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-black text-slate-500 uppercase leading-none mb-1">Gap to Level Up</p>
                        <div class="flex items-baseline leading-none">
                            <span id="next-level-info" class="text-lg font-black text-white tabular-nums">+500</span>
                            <span class="text-[10px] font-black text-slate-500 uppercase ml-1">EXP</span>
                        </div>
                    </div>
                </div>
                <div class="h-2 w-full bg-white/5 rounded-full overflow-hidden">
                    <div id="level-progress-bar" class="h-full bg-gradient-to-r from-lime-600 from-lime-300" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- ADVISOR -->
        <div id="advisor-box" class="liquid-glass p-5 rounded-[2rem] flex items-start gap-4 shrink-0">
            <div class="w-10 h-10 rounded-xl bg-lime-500/10 border border-lime-500/20 flex items-center justify-center text-lime-400 shrink-0">
                <i data-lucide="shield-check" class="w-6 h-6"></i>
            </div>
            <div class="flex-1 min-h-[50px]">
                <p id="advisor-text" class="text-[14px] font-bold text-white leading-relaxed typewriter">Strategic Protocol Initialized...</p>
            </div>
        </div>

        <!-- MAIN ACTION VIEW -->
        <div id="action-view" class="flex-1 grid grid-cols-2 gap-3 overflow-y-auto pr-1 content-start pb-24"></div>

        <!-- STATS VIEW -->
        <div id="stats-view" class="hidden flex-1 flex flex-col gap-4 overflow-hidden">
            <!-- Points Summary (Resized to 3xl) -->
            <div class="liquid-glass p-6 rounded-[2rem] text-center shrink-0 border border-lime-500/10">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-1">Accumulated EXP</p>
                <div class="flex items-baseline justify-center gap-3">
                    <span id="stats-total-points" class="text-3xl font-black text-white tabular-nums tracking-tighter">0</span>
                    <span id="stats-next-goal" class="text-[11px] font-bold text-lime-400 uppercase tracking-widest opacity-80">+0 NEXT</span>
                </div>
            </div>
            
            <!-- Larger Radar Chart -->
            <div class="liquid-glass p-6 rounded-[2.5rem] shrink-0">
                <div class="chart-wrapper">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>

            <!-- Scrollable History List (independent scroll) -->
            <div class="flex-1 overflow-y-auto space-y-2 pb-32 pr-1" id="history-list"></div>
        </div>

        <!-- FLOATING ACTION BUTTON -->
        <button id="toggle-view-btn" onclick="toggleView()" class="fixed bottom-10 right-6 w-16 h-16 bg-lime-500 text-black rounded-3xl shadow-[0_15px_40px_rgba(132,204,22,0.4)] flex items-center justify-center active-tap z-50">
            <i id="view-icon" data-lucide="bar-chart-3" class="w-7 h-7"></i>
        </button>

        <!-- COMMIT PANEL (Side-Slide) -->
        <div id="detail-panel" class="fixed inset-0 z-50 flex justify-end pointer-events-none overflow-hidden">
            <div id="panel-backdrop" class="absolute inset-0 bg-black/80 opacity-0 transition-opacity"></div>
            <div id="panel-content" class="w-[90%] h-full liquid-glass border-l border-white/10 p-8 transform translate-x-full transition-transform duration-400 pointer-events-auto flex flex-col gap-8">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="text-xl font-black text-white uppercase tracking-tighter">Commit Action</h2>
                        <div class="flex items-baseline gap-2 mt-1">
                            <!-- v12.5: Resized to 3xl for consistency -->
                            <p id="panel-points" class="text-3xl font-black text-lime-400 tracking-tighter tabular-nums">+10 EXP</p>
                            <span class="text-[10px] font-black text-white/30 uppercase tracking-widest">Gain</span>
                        </div>
                    </div>
                    <button onclick="closePanel()" class="p-3 bg-white/10 rounded-full text-white active-tap"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <div class="space-y-8 flex-1 overflow-y-auto pr-1">
                    <div>
                        <p class="text-xs font-black text-white/50 uppercase tracking-widest mb-4">Target Unit</p>
                        <div id="target-selector" class="grid grid-cols-2 gap-3">
                            <button onclick="selectTarget('AKS')" class="target-opt bg-white/5 border border-white/10 rounded-2xl py-4 text-xs font-bold text-white active-tap">AKS</button>
                            <button onclick="selectTarget('YSD')" class="target-opt bg-white/5 border border-white/10 rounded-2xl py-4 text-xs font-bold text-white active-tap">YSD</button>
                            <button onclick="selectTarget('YKO')" class="target-opt bg-white/5 border border-white/10 rounded-2xl py-4 text-xs font-bold text-white active-tap">YKO</button>
                            <button onclick="selectTarget('BODY')" class="target-opt bg-white/5 border border-white/10 rounded-2xl py-4 text-xs font-bold text-white active-tap">HEALTH</button>
                        </div>
                    </div>
                    <textarea id="log-memo" rows="4" placeholder="状況、気づき、改善ロジック..." class="w-full bg-black/40 border border-white/10 rounded-2xl p-5 text-sm text-white focus:border-lime-500/50 outline-none"></textarea>
                </div>
                <button onclick="saveLog()" class="shrink-0 w-full bg-lime-500 text-black font-black py-5 rounded-2xl text-lg active-tap">COMMIT ACTION</button>
            </div>
        </div>

        <!-- MASTER SETTINGS -->
        <div id="master-view" class="hidden fixed inset-0 z-[100] bg-black/90 backdrop-blur-xl p-8 flex flex-col overflow-y-auto transform translate-y-full transition-transform duration-500">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-black text-white uppercase tracking-widest">Maintenance</h3>
                <button onclick="toggleMasterView()" class="p-4 bg-white/10 rounded-full text-white active-tap"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div id="master-list" class="space-y-4 pb-20"></div>
        </div>
    </div>

    <script>
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz-Lk_8UhahzIlmYDtf6Dh5N_B53cJUUnlm6Ig5MwHvtPO7J4IZ2gXiNo8imHvPHiEh9g/exec"; 

        const DEFAULT_ACTIONS = [
            { id: 'pillow', label: '枕詞', points: 10, icon: 'message-square', color: 'from-cyan-400 to-blue-600' },
            { id: 'gym', label: 'GYM', points: 20, icon: 'dumbbell', color: 'from-indigo-400 to-violet-600' },
            { id: 'sketch', label: 'スケッチ', points: 10, icon: 'pencil', color: 'from-orange-500 to-amber-600' },
            { id: 'network', label: '雑談', points: 15, icon: 'users', color: 'from-emerald-400 to-teal-600' },
            { id: 'thanks_daily', label: 'ありがとう', points: 5, icon: 'heart', color: 'from-pink-400 to-rose-600' },
            { id: 'stairs', label: '階段利用', points: 5, icon: 'trending-up', color: 'from-orange-400 to-rose-500' },
            { id: 'thanks_pub', label: '称賛', points: 30, icon: 'trophy', color: 'from-yellow-400 to-orange-600' },
            { id: 'bike', label: '自転車通勤', points: 10, icon: 'bike', color: 'from-lime-400 to-emerald-500' }
        ];

        const ADVISORY_DATABASE = [
            "✨ 相手の話を聞く時はスマホを伏せる。最高のパフォーマンスになります。",
            "✨ 3秒だけ相手に視線を向ける。割り込みOKのフラグになります。",
            "✨ 挨拶に『北海道の寒さ』を一言。警戒心をデフラグします。",
            "✨ 表情筋を0.5ミリ緩める。威圧から安心に変換されます。",
            "🎯 相手の『なぜ』を先に理解することが、最速の合意形成への近道。",
            "沈黙の3秒は、相手が本音を話すための『招待状』です。",
            "筋肥大は、将来のニモさんへの最高密度の断熱材。",
            "『お力添えいただけますか？』で、相手の自尊心を刺激しましょう。"
        ];

        let state = { totalPoints: 0, currentLevel: 1, isMuted: false, currentAction: null, selectedTarget: null, view: 'action', logs: [], actions: [] };
        let radarChartInstance = null;
        let typeWriterTimeout = null;

        function getExpRequiredForLevel(lv) { return Math.floor(500 + (2000 / (1 + Math.exp(-0.5 * (lv - 5))))); }

        function init() { loadData(); lucide.createIcons(); renderButtons(); updateUI(); startAdvisor(); syncFromGas(); }
        
        function loadData() {
            const saved = localStorage.getItem('eq_logic_v11');
            if (saved) {
                const p = JSON.parse(saved);
                state.totalPoints = p.totalPoints || 0;
                state.logs = p.logs || [];
                state.actions = (p.actions && p.actions.length === 8) ? p.actions : DEFAULT_ACTIONS;
            } else { state.actions = DEFAULT_ACTIONS; }
        }

        function saveData() { localStorage.setItem('eq_logic_v11', JSON.stringify({ totalPoints: state.totalPoints, logs: state.logs, actions: state.actions })); }

        async function syncFromGas() {
            try {
                const res = await fetch(GAS_WEBAPP_URL);
                const cloudLogs = await res.json();
                if (Array.isArray(cloudLogs)) {
                    state.logs = cloudLogs.map((l, i) => ({
                        id: i, label: l.label, points: l.points, target: l.target, timestamp: l.timestamp,
                        colorClass: state.actions.find(a => a.label === l.label)?.color || 'from-slate-800'
                    }));
                    state.totalPoints = cloudLogs.reduce((s, l) => s + l.points, 0);
                    saveData(); updateUI();
                }
            } catch (e) { console.error(e); }
        }

        function startAdvisor() {
            const el = document.getElementById('advisor-text');
            const txt = ADVISORY_DATABASE[Math.floor(Math.random() * ADVISORY_DATABASE.length)];
            if (typeWriterTimeout) clearTimeout(typeWriterTimeout);
            el.innerText = ''; let i = 0;
            function type() { if (i < txt.length) { el.innerText += txt.charAt(i); i++; typeWriterTimeout = setTimeout(type, 50); } }
            type();
        }

        function updateUI() {
            let pts = state.totalPoints; let lv = 1;
            while (pts >= getExpRequiredForLevel(lv)) { pts -= getExpRequiredForLevel(lv); lv++; }
            const req = getExpRequiredForLevel(lv);
            document.getElementById('header-total-points').innerText = state.totalPoints.toLocaleString();
            document.getElementById('stats-total-points').innerText = state.totalPoints.toLocaleString();
            document.getElementById('stats-next-goal').innerText = `+${req - pts} NEXT`;
            document.getElementById('level-badge').innerText = `Lv.${lv} Specialist`;
            document.getElementById('next-level-info').innerText = `+${req - pts}`;
            document.getElementById('level-progress-bar').style.width = `${(pts / req) * 100}%`;
        }

        function renderButtons() {
            const container = document.getElementById('action-view'); container.innerHTML = '';
            state.actions.forEach((a, i) => {
                const btn = document.createElement('button');
                btn.className = `bg-gradient-to-br ${a.color} rounded-3xl flex items-center justify-between px-5 active-tap h-[76px] border border-white/10 shadow-lg`;
                btn.onclick = () => { state.currentAction = a; if (['gym', 'stairs', 'bike'].includes(a.id)) { state.selectedTarget = 'BODY'; saveLog(""); } else openPanel(a); };
                btn.innerHTML = `<div class="flex items-center gap-3"><i data-lucide="${a.icon}" class="w-5 h-5 text-white"></i><span class="text-[14px] font-black text-white">${a.label}</span></div><span class="text-[11px] font-black text-white/40 tracking-widest">+${a.points}</span>`;
                container.appendChild(btn);
            });
            lucide.createIcons();
        }

        function toggleView() {
            state.view = state.view === 'action' ? 'stats' : 'action';
            document.getElementById('global-header').classList.toggle('hidden', state.view === 'stats');
            document.getElementById('advisor-box').classList.toggle('hidden', state.view === 'stats');
            document.getElementById('action-view').classList.toggle('hidden', state.view !== 'action');
            document.getElementById('stats-view').classList.toggle('hidden', state.view !== 'stats');
            const icon = document.getElementById('view-icon');
            icon.setAttribute('data-lucide', state.view === 'stats' ? 'layout-grid' : 'bar-chart-3');
            if (state.view === 'stats') renderStats();
            lucide.createIcons();
        }

        function openPanel(a) {
            state.selectedTarget = null;
            document.getElementById('panel-title').innerText = `${a.label} Commit`;
            document.getElementById('panel-points').innerText = `+${a.points} EXP`;
            document.getElementById('detail-panel').classList.remove('pointer-events-none');
            document.getElementById('panel-content').classList.remove('translate-x-full');
            document.getElementById('panel-backdrop').style.opacity = '1';
        }

        function closePanel() {
            document.getElementById('panel-content').classList.add('translate-x-full');
            document.getElementById('panel-backdrop').style.opacity = '0';
            setTimeout(() => document.getElementById('detail-panel').classList.add('pointer-events-none'), 400);
        }

        function selectTarget(t) {
            state.selectedTarget = t;
            document.querySelectorAll('.target-opt').forEach(btn => {
                const isActive = btn.innerText.includes(t==='BODY'?'HEALTH':t);
                btn.style.borderColor = isActive ? 'var(--accent-lime)' : 'rgba(255,255,255,0.1)';
                btn.style.backgroundColor = isActive ? 'rgba(132, 204, 22, 0.1)' : 'rgba(255,255,255,0.05)';
            });
        }

        function saveLog(memo = null) {
            const a = state.currentAction; const target = state.selectedTarget || 'BODY';
            const log = { id: Date.now(), label: a.label, points: a.points, target: target, timestamp: new Date().toISOString(), colorClass: a.color };
            state.logs.unshift(log); state.totalPoints += a.points;
            fetch(GAS_WEBAPP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ ...log, memo: memo || document.getElementById('log-memo').value }) });
            saveData(); updateUI(); closePanel();
        }

        function renderStats() {
            const list = document.getElementById('history-list'); list.innerHTML = '';
            const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            
            // Radar Chart Data (7 Days)
            const weekLogs = state.logs.filter(l => new Date(l.timestamp).getTime() >= (today - 6*24*60*60*1000));
            const labels = state.actions.map(a => a.label);
            const dataCounts = labels.map(label => weekLogs.filter(l => l.label === label).length);
            updateRadarChart(labels, dataCounts);

            // History List (Scrollable)
            state.logs.forEach(l => {
                const container = document.createElement('div'); container.className = 'log-item-container liquid-glass';
                const d = new Date(l.timestamp);
                const localISO = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
                
                container.innerHTML = `
                    <div class="delete-btn-bg" onclick="deleteLog(${l.id})">DELETE</div>
                    <div class="log-item-content flex justify-between items-center py-2.5 bg-gradient-to-r ${l.colorClass} border-b border-white/5">
                        <div class="flex flex-col flex-1 pl-5">
                            <div class="flex items-center gap-4">
                                <span class="text-[14px] font-black text-white shrink-0">${l.label}</span>
                                <!-- step="1800" for 30-minute intervals -->
                                <input type="datetime-local" step="1800" value="${localISO}" onchange="updateLogTimestamp(${l.id}, this.value)" class="datetime-input">
                            </div>
                            <span class="text-[9px] font-black text-white/30 uppercase tracking-[0.2em] leading-none mt-1.5">${l.target}</span>
                        </div>
                        <span class="text-[15px] font-black text-white pr-5">+${l.points}</span>
                    </div>
                `;
                setupSwipe(container);
                list.appendChild(container);
            });
        }

        function updateRadarChart(labels, data) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (radarChartInstance) radarChartInstance.destroy();
            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{ data: data, backgroundColor: 'rgba(132, 204, 22, 0.2)', borderColor: '#84cc16', borderWidth: 2, pointRadius: 2 }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: 'rgba(255,255,255,0.5)', font: { size: 9, weight: '900' } },
                            ticks: { display: false },
                            suggestedMin: 0
                        }
                    },
                    plugins: { legend: { display: false } },
                    animation: { duration: 800 }
                }
            });
        }

        function setupSwipe(container) {
            const content = container.querySelector('.log-item-content'); let startX = 0; let currentTranslate = 0;
            content.addEventListener('touchstart', e => { 
                if (e.target.tagName === 'INPUT') return;
                startX = e.touches[0].clientX; 
                content.style.transition = 'none'; 
            }, { passive: true });
            
            content.addEventListener('touchmove', e => { 
                if (e.target.tagName === 'INPUT') return;
                const diff = e.touches[0].clientX - startX; 
                if (diff < 0) { 
                    currentTranslate = Math.max(diff, -80); 
                    content.style.transform = `translateX(${currentTranslate}px)`; 
                } 
            }, { passive: true });
            
            content.addEventListener('touchend', () => { 
                content.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)'; 
                if (currentTranslate < -50) { content.style.transform = 'translateX(-80px)'; } else { content.style.transform = 'translateX(0)'; } 
            });
        }

        function deleteLog(id) {
            const idx = state.logs.findIndex(l => l.id === id);
            if (idx > -1) { state.totalPoints -= state.logs[idx].points; state.logs.splice(idx, 1); saveData(); updateUI(); renderStats(); }
        }

        function updateLogTimestamp(id, val) {
            const idx = state.logs.findIndex(l => l.id === id);
            if (idx > -1) {
                state.logs[idx].timestamp = new Date(val).toISOString();
                saveData();
                updateUI();
                renderStats();
            }
        }

        function toggleMute() { state.isMuted = !state.isMuted; const icon = document.getElementById('mute-icon'); icon.setAttribute('data-lucide', state.isMuted ? 'volume-x' : 'volume-2'); lucide.createIcons(); }

        function toggleMasterView() {
            const m = document.getElementById('master-view');
            const open = m.classList.contains('translate-y-full');
            if (open) { m.classList.remove('hidden'); setTimeout(() => m.classList.remove('translate-y-full'), 10); renderMaster(); }
            else { m.classList.add('translate-y-full'); setTimeout(() => m.classList.add('hidden'), 500); }
        }

        function renderMaster() {
            const list = document.getElementById('master-list'); list.innerHTML = '';
            state.actions.forEach((a, i) => {
                const item = document.createElement('div'); item.className = `p-5 rounded-2xl liquid-glass`;
                item.innerHTML = `<div class="flex items-center gap-3 mb-3"><i data-lucide="${a.icon}" class="w-4 h-4 text-lime-500"></i><span class="text-xs font-black text-white uppercase">${a.label}</span></div><div class="grid grid-cols-2 gap-3"><input type="text" value="${a.label}" onchange="state.actions[${i}].label=this.value;saveData();" class="bg-black/50 border border-white/10 rounded-lg p-3 text-xs text-white"><input type="number" value="${a.points}" onchange="state.actions[${i}].points=parseInt(this.value);saveData();" class="bg-black/50 border border-white/10 rounded-lg p-3 text-xs text-white"></div>`;
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
