<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gridlock Zero Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0F172A;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            color: #38BDF8;
            width: calc(100% - 40px);
        }
        .stats {
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .current-mode-display {
            position: absolute;
            top: 20px;
            right: 0;
            text-align: right;
            font-weight: bold;
            font-size: 12px;
        }
        /* ツールバー：直感操作のためのラベル付き */
        .toolbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(30, 41, 59, 0.95);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #475569;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .tool-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .tool-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .tool-btn.active {
            border-color: white;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }
        .tool-label {
            font-size: 9px;
            color: #94A3B8;
            font-weight: bold;
        }
        .tool-btn.active + .tool-label {
            color: white;
        }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <h1 class="text-xl font-bold italic mb-1">GRIDLOCK ZERO</h1>
        <div class="flex justify-between items-start">
            <div>
                <div class="stats text-white">SCORE: <span id="score-val" class="text-sky-400">0</span></div>
                <div class="stats text-white">CONGESTION: <span id="congestion-val" class="text-rose-400">0</span>%</div>
            </div>
            <div class="current-mode-display">
                <div class="text-slate-400 uppercase">Current Tool</div>
                <div id="active-mode-text" class="text-sky-400 text-lg">開通 / 廃止</div>
            </div>
        </div>
    </div>

    <div class="toolbar" id="toolbar">
        <div class="tool-group">
            <div class="tool-btn active bg-slate-600" data-mode="toggle" data-label="開通 / 廃止">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
            </div>
            <div class="tool-label">ON/OFF</div>
        </div>
        <div class="tool-group">
            <div class="tool-btn bg-[#00E5FF]" data-mode="cyan" data-label="水色専用"></div>
            <div class="tool-label">CYAN</div>
        </div>
        <div class="tool-group">
            <div class="tool-btn bg-[#FF4081]" data-mode="magenta" data-label="赤紫専用"></div>
            <div class="tool-label">MAGENTA</div>
        </div>
        <div class="tool-group">
            <div class="tool-btn bg-[#CCFF00]" data-mode="lime" data-label="黄緑専用"></div>
            <div class="tool-label">LIME</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const congEl = document.getElementById('congestion-val');
        const modeTextEl = document.getElementById('active-mode-text');
        const toolbar = document.getElementById('toolbar');

        const CONFIG = {
            nodesCount: 6, // 6x6 nodes = 5x5 cells (ニモさんのリクエスト)
            colors: {
                bg: '#0F172A',
                grid: '#1E293B',
                gridActive: '#334155',
                carTypes: [
                    { id: 'cyan', color: '#00E5FF' },
                    { id: 'magenta', color: '#FF4081' },
                    { id: 'lime', color: '#CCFF00' }
                ],
                danger: '#FB7185'
            },
            edgeHitWidth: 35, // さらに当たり判定を拡大
            carSpeed: 0.00065 // 少しゆっくりに調整
        };

        let state = {
            score: 0,
            congestion: 0,
            edges: [], 
            cars: [],  
            lastTime: 0,
            selectedMode: 'toggle'
        };

        function initGrid() {
            state.edges = [];
            for (let y = 0; y < CONFIG.nodesCount; y++) {
                for (let x = 0; x < CONFIG.nodesCount - 1; x++) {
                    state.edges.push({ n1: [x, y], n2: [x + 1, y], active: true, vertical: false, carsOn: 0, restriction: null });
                }
            }
            for (let x = 0; x < CONFIG.nodesCount; x++) {
                for (let y = 0; y < CONFIG.nodesCount - 1; y++) {
                    state.edges.push({ n1: [x, y], n2: [x, y + 1], active: true, vertical: true, carsOn: 0, restriction: null });
                }
            }
        }

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            const size = Math.min(window.innerWidth, window.innerHeight * 0.75);
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            canvas.style.width = `${size}px`;
            canvas.style.height = `${size}px`;
            canvas.style.marginTop = `${(window.innerHeight - size) / 2 - 40}px`;
            canvas.style.marginLeft = `${(window.innerWidth - size) / 2}px`;
            ctx.scale(dpr, dpr);
        }

        function findShortestPath(start, target, carColorId) {
            const queue = [[start]];
            const visited = new Set();
            visited.add(`${start[0]},${start[1]}`);

            while (queue.length > 0) {
                const path = queue.shift();
                const [cx, cy] = path[path.length - 1];
                if (cx === target[0] && cy === target[1]) return path;

                const neighbors = [];
                state.edges.forEach(e => {
                    if (!e.active) return;
                    if (e.restriction && e.restriction !== carColorId) return;
                    if (e.n1[0] === cx && e.n1[1] === cy) neighbors.push(e.n2);
                    if (e.n2[0] === cx && e.n2[1] === cy) neighbors.push(e.n1);
                });

                for (const next of neighbors) {
                    const key = `${next[0]},${next[1]}`;
                    if (!visited.has(key)) {
                        visited.add(key);
                        queue.push([...path, next]);
                    }
                }
            }
            return null;
        }

        function spawnCar() {
            const getBoundaryNode = () => {
                const side = Math.floor(Math.random() * 4);
                if (side === 0) return [0, Math.floor(Math.random() * CONFIG.nodesCount)];
                if (side === 1) return [CONFIG.nodesCount - 1, Math.floor(Math.random() * CONFIG.nodesCount)];
                if (side === 2) return [Math.floor(Math.random() * CONFIG.nodesCount), 0];
                return [Math.floor(Math.random() * CONFIG.nodesCount), CONFIG.nodesCount - 1];
            };

            const start = getBoundaryNode();
            let target = getBoundaryNode();
            while (target[0] === start[0] && target[1] === start[1]) target = getBoundaryNode();

            const colorIdx = Math.floor(Math.random() * CONFIG.colors.carTypes.length);
            const colorId = CONFIG.colors.carTypes[colorIdx].id;

            const path = findShortestPath(start, target, colorId);
            if (!path || path.length < 2) return;

            state.cars.push({
                curr: [...start],
                next: [...path[1]],
                target: [...target],
                colorIdx: colorIdx,
                colorId: colorId,
                progress: 0,
                stuck: false
            });
        }

        function update(deltaTime) {
            state.edges.forEach(e => e.carsOn = 0);
            for (let i = state.cars.length - 1; i >= 0; i--) {
                const car = state.cars[i];
                if (car.progress >= 1) {
                    car.curr = [...car.next];
                    if (car.curr[0] === car.target[0] && car.curr[1] === car.target[1]) {
                        state.cars.splice(i, 1);
                        state.score += 100; // スコア加算
                        continue;
                    }
                    const newPath = findShortestPath(car.curr, car.target, car.colorId);
                    if (newPath && newPath.length >= 2) {
                        car.next = [...newPath[1]];
                        car.progress = 0;
                        car.stuck = false;
                    } else {
                        car.stuck = true;
                    }
                } else if (!car.stuck) {
                    car.progress += deltaTime * CONFIG.carSpeed;
                } else {
                    const retryPath = findShortestPath(car.curr, car.target, car.colorId);
                    if (retryPath && retryPath.length >= 2) {
                        car.next = [...retryPath[1]];
                        car.progress = 0;
                        car.stuck = false;
                    }
                }
                if (!car.stuck) {
                    const edge = state.edges.find(e => {
                        const match1 = e.n1[0] === car.curr[0] && e.n1[1] === car.curr[1] && e.n2[0] === car.next[0] && e.n2[1] === car.next[1];
                        const match2 = e.n2[0] === car.curr[0] && e.n2[1] === car.curr[1] && e.n1[0] === car.next[0] && e.n1[1] === car.next[1];
                        return match1 || match2;
                    });
                    if (edge) edge.carsOn++;
                }
            }

            const congestedCount = state.edges.filter(e => e.carsOn > 1).length;
            state.congestion = Math.min(100, Math.floor((congestedCount / state.edges.length) * 1000));
            scoreEl.innerText = state.score;
            congEl.innerText = state.congestion;

            if (Math.random() < 0.015 && state.cars.length < 15) spawnCar();
        }

        function draw() {
            const size = Math.min(window.innerWidth, window.innerHeight * 0.75);
            const step = size / (CONFIG.nodesCount - 1);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 道路
            state.edges.forEach(edge => {
                const x1 = edge.n1[0] * step, y1 = edge.n1[1] * step;
                const x2 = edge.n2[0] * step, y2 = edge.n2[1] * step;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                
                if (!edge.active) {
                    ctx.strokeStyle = '#1e293b';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([2, 6]);
                } else {
                    ctx.setLineDash([]);
                    if (edge.restriction) {
                        const type = CONFIG.colors.carTypes.find(t => t.id === edge.restriction);
                        ctx.strokeStyle = type.color;
                        ctx.lineWidth = 4;
                        ctx.setLineDash([10, 5]);
                    } else if (edge.carsOn > 1) {
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = CONFIG.colors.danger;
                        ctx.strokeStyle = CONFIG.colors.danger;
                        ctx.lineWidth = 5;
                    } else {
                        ctx.shadowBlur = 0;
                        ctx.strokeStyle = CONFIG.colors.gridActive;
                        ctx.lineWidth = 3;
                    }
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
            });

            ctx.setLineDash([]);

            // 車両
            state.cars.forEach(car => {
                const x = (car.curr[0] + (car.next[0] - car.curr[0]) * car.progress) * step;
                const y = (car.curr[1] + (car.next[1] - car.curr[1]) * car.progress) * step;
                ctx.beginPath();
                ctx.arc(x, y, 8, 0, Math.PI * 2);
                ctx.fillStyle = CONFIG.colors.carTypes[car.colorIdx].color;
                if (car.stuck) {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#FFFFFF';
                    ctx.strokeStyle = '#FFFFFF';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else {
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = ctx.fillStyle;
                }
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        function loop(time) {
            update(time - state.lastTime);
            state.lastTime = time;
            draw();
            requestAnimationFrame(loop);
        }

        toolbar.addEventListener('touchstart', (e) => {
            const btn = e.target.closest('.tool-btn');
            if (!btn) return;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.selectedMode = btn.dataset.mode;
            modeTextEl.innerText = btn.dataset.label;
            if (navigator.vibrate) navigator.vibrate(15);
        });

        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const pos = { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
            const size = Math.min(window.innerWidth, window.innerHeight * 0.75);
            const step = size / (CONFIG.nodesCount - 1);
            
            const edge = state.edges.find(edge => {
                const x1 = edge.n1[0] * step, y1 = edge.n1[1] * step;
                const x2 = edge.n2[0] * step, y2 = edge.n2[1] * step;
                const minX = Math.min(x1, x2) - CONFIG.edgeHitWidth;
                const maxX = Math.max(x1, x2) + CONFIG.edgeHitWidth;
                const minY = Math.min(y1, y2) - CONFIG.edgeHitWidth;
                const maxY = Math.max(y1, y2) + CONFIG.edgeHitWidth;
                if (pos.x >= minX && pos.x <= maxX && pos.y >= minY && pos.y <= maxY) {
                    return edge.vertical ? Math.abs(pos.x - x1) < CONFIG.edgeHitWidth : Math.abs(pos.y - y1) < CONFIG.edgeHitWidth;
                }
                return false;
            });

            if (edge) {
                if (state.selectedMode === 'toggle') {
                    edge.active = !edge.active;
                    edge.restriction = null;
                } else {
                    edge.active = true;
                    edge.restriction = (edge.restriction === state.selectedMode) ? null : state.selectedMode;
                }
                if (navigator.vibrate) navigator.vibrate(40);
            }
        });

        document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        window.addEventListener('resize', resize);
        resize();
        initGrid();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
